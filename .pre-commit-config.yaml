# CANON: aidoc-flow-ci pre_push_check (idempotency marker per PLAN-002 §5.2)
#
# Canonical pre-commit fragment wiring the canon pre_push_check.sh hook.
# `install/install.sh` merges this block into a consumer's
# `.pre-commit-config.yaml` idempotently (marker comment above triggers
# no-op re-installation).
#
# TWO surfaces are wired:
#   (a) `default_install_hook_types: [pre-commit, pre-push]` at the root —
#       ensures `pre-commit install` also sets up the pre-push git hook.
#       install.sh upgrades the value in-place if consumer has only
#       [pre-commit]; leaves alone if already [pre-commit, pre-push].
#   (b) The pre-push local hook below, invoking scripts/pre_push_check.sh.
#
# Consumers that need repo-specific extras (e.g., verified-planning
# `check_plan.py`) point this entry at `scripts/pre_push_check_<repo>.sh`
# WRAPPER instead — wrapper sources canon + adds its own checks. See
# PLAN-002 §4.8 for the operations wrapper reference design.

default_install_hook_types:
- pre-commit
- pre-push

repos:
# Wave-0 self-adoption of the canon fragment's commit-stage hooks (PLAN-018 F3).
# Hand-added: this file already carries the CANON marker, so install.sh's merge
# no-ops here and would never deliver them — the canon-dogfoods-its-own-canon
# rule in CLAUDE.md requires canon to carry what it ships. (That the merge cannot
# reach an already-marked config is FT-32, a real defect, not this file's doing.)
- repo: https://github.com/pre-commit/pre-commit-hooks
  # SHA-pinned, not tag-pinned. A git tag is attacker-mutable state on
  # infrastructure this workspace does not control, and pre-commit `pip install`s
  # the cloned tree — so the upstream build backend runs arbitrary code at
  # INSTALL time, on developer machines and on the ephemeral self-hosted CI pool.
  # Those runners are cold every run (no cache step in the reusable), so they
  # re-resolve the ref on every execution: a moved tag would reach the whole
  # fleet within one CI cycle. Canon SHA-pins every `uses:` for exactly this
  # reason (REPO_STANDARDS §4.3); a mutable rev here would be strictly weaker
  # than everything else canon does, in the file that propagates furthest.
  # Format is `pre-commit autoupdate --freeze` output, so bumps round-trip.
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: local
  hooks:
  - id: aidoc-flow-pre-push
    name: aidoc-flow canon pre-push validation + OPS-0069 audit-trail check
    entry: scripts/pre_push_check.sh
    language: script
    stages:
    - pre-push
    pass_filenames: false
    always_run: true
  # Repo-specific extra (NOT part of the consumer canon fragment): keep the
  # docs' install references in sync with the single-source VERSION file so
  # they cannot silently go stale across release cuts (PLAN-004 BL-4).
  - id: sync-version-refs
    name: docs install refs match VERSION (PLAN-004 BL-4)
    entry: scripts/sync-version-refs.sh --check
    language: script
    files: '^(VERSION|README\.md|install/README\.md|docs/(multi-project-guide|PLAYBOOK_governance-canon-rollout|REVIEWER_APP_ONBOARDING|BRANCH_PROTECTION)\.md|install/templates/workflows/.*\.yml)$'
    pass_filenames: false
