# CANON: aidoc-flow-ci pre_push_check v2 (idempotency marker per PLAN-002 §5.2)
#
# MARKER VERSION (PLAN-018 FT-32). The trailing `vN` is the REFRESH KEY: bootstrap
# re-merges this block when a consumer's marker version is LOWER than canon's, so a
# canon change to the fragment can actually reach an already-adopted repo. Before
# this, an adopted consumer was frozen forever (bootstrap no-op'd on the marker,
# `--update` excludes this file, `--apply` writes no content) and manifest.json's
# "re-run install.sh to refresh those" was FALSE for it. BUMP vN whenever the block
# below changes; the merge is additive + de-dups, so a re-merge never clobbers
# consumer entries.
#
# Canonical pre-commit fragment wiring the canon pre_push_check.sh hook.
# `install/install.sh` merges this block into a consumer's
# `.pre-commit-config.yaml` idempotently (marker comment above triggers
# no-op re-installation).
#
# TWO surfaces are wired:
#   (a) `default_install_hook_types: [pre-commit, pre-push]` at the root —
#       ensures `pre-commit install` also sets up the pre-push git hook.
#       install.sh upgrades the value in-place if consumer has only
#       [pre-commit]; leaves alone if already [pre-commit, pre-push].
#   (b) The pre-push local hook below, invoking scripts/pre_push_check.sh.
#   (c) Commit-stage hooks from pre-commit-hooks (PLAN-018 F3). WITHOUT these
#       the fragment had NO commit-stage hook at all: the `pre-commit` reusable
#       runs `pre-commit run --all-files` with no `--hook-stage` (the default),
#       which selects the `pre-commit` stage — so zero hooks matched and the
#       check exited 0 while inspecting nothing. That check is REQUIRED on every
#       tier that has required checks, so a fresh adopter's only required gate
#       was vacuous by construction.
#
#       This is canon's first third-party `rev` — the fragment was `repo: local`
#       only. Accepted deliberately: the alternative is canon maintaining its own
#       linters. NOTE the rev has no automated bump path (no dependabot
#       `pre-commit` ecosystem in canon or the consumer template) — see FT-35.
#
# Consumers that need repo-specific extras (e.g., verified-planning
# `check_plan.py`) point this entry at `scripts/pre_push_check_<repo>.sh`
# WRAPPER instead — wrapper sources canon + adds its own checks. See
# PLAN-002 §4.8 for the operations wrapper reference design.

default_install_hook_types:
- pre-commit
- pre-push

repos:
# Commit-stage hooks (PLAN-018 F3). These run at the DEFAULT `pre-commit` stage,
# which is what the `pre-commit` reusable selects — they are what makes the
# required check inspect anything at all.
- repo: https://github.com/pre-commit/pre-commit-hooks
  # SHA-pinned, not tag-pinned. A git tag is attacker-mutable state on
  # infrastructure this workspace does not control, and pre-commit `pip install`s
  # the cloned tree — so the upstream build backend runs arbitrary code at
  # INSTALL time, on developer machines and on the ephemeral self-hosted CI pool.
  # Those runners are cold every run (no cache step in the reusable), so they
  # re-resolve the ref on every execution: a moved tag would reach the whole
  # fleet within one CI cycle. Canon SHA-pins every `uses:` for exactly this
  # reason (REPO_STANDARDS §4.3); a mutable rev here would be strictly weaker
  # than everything else canon does, in the file that propagates furthest.
  # Format is `pre-commit autoupdate --freeze` output, so bumps round-trip.
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-yaml
  - id: end-of-file-fixer
  - id: trailing-whitespace
- repo: local
  hooks:
  - id: aidoc-flow-pre-push
    name: aidoc-flow canon pre-push validation + OPS-0069 audit-trail check
    entry: scripts/pre_push_check.sh
    language: script
    stages:
    - pre-push
    pass_filenames: false
    always_run: true
