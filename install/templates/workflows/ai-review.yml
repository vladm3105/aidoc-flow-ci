# PROTECTED caller — uniform on PUBLIC and PRIVATE repos (PLAN-013).
# Runs on the ephemeral self-hosted single-use pool regardless of visibility:
# there is no `-public`/`-private` split, so a repo visibility flip is a no-op.
# Safe on public repos because forks are never trusted (see `.github/ai-review/
# config.json` trust gate) → a fork PR reaches only the no-PR-code trust job on
# the isolated pool; the heavy review job runs only for trusted, non-fork authors.
#
# Secrets required (consumer adds to repo secrets):
#   APP_REVIEWER_1_ID + APP_REVIEWER_1_KEY  reviewer App credentials
#   LITELLM_BASE_URL                         proxy base URL (normally .../v1)
#   LITELLM_REVIEW_API_KEY                   review-scoped LiteLLM virtual key
#
# Autofix (PLAN-012) — OPT-IN, DEFAULT-OFF. The `autofix` job in the reusable is
# INERT unless BOTH the trusted config sets `autofix.enabled: true` AND these are set:
#   APP_AUTOFIX_ID + APP_AUTOFIX_KEY         DEDICATED autofix App (contents:write) —
#                                            a SEPARATE App from the reviewer App
#   LITELLM_FIX_API_KEY                      fix-scoped LiteLLM virtual key
#   (repo var) LITELLM_FIXER_MODEL           fixer model alias (default `ai-fixer`)
# Without the App creds the job self-skips; a PR branch cannot enable autofix
# (autofix.enabled is resolved from the trusted config repo, never the PR).
#
# `pull_request_target` (not `pull_request`) is required so the trust gate has
# write-capable credentials + secrets; the heavy job runs only for trusted
# authors per `.github/ai-review/config.json`.
name: ai-review
on:
  pull_request_target:
    # FT-43: ready_for_review + converted_to_draft so a draft→ready transition
    # triggers a real review (and a ready→draft is seen by the fail-closed guard),
    # rather than a code-changed-while-draft PR going straight to merge un-reviewed.
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review, converted_to_draft]
  pull_request_review:
    types: [submitted]

# Caller-level permissions set the ceiling for the reusable. The canon repo
# default is `read` (install/templates/actions-permissions.json), and the
# reusable requests contents/pull-requests/issues: write — so WITHOUT this
# block the reusable exceeds the caller grant and fails at load
# (startup_failure, zero jobs) on any consumer under the read default. Scopes
# match the reusable's own declaration (ai-review.yml). Safe under
# pull_request_target because the reusable is diff-only on the REVIEW path: the
# heavy review job fetches the diff via curl and never `actions/checkout`s the PR
# head; the sole review-path checkout is the trust gate reading the trust-config
# repo. (Exception — the DEFAULT-OFF autofix job DOES check out the PR head to
# apply a fix, but with a read-only token, `persist-credentials: false`, and it
# never EXECUTES PR code (only `git apply` + a canon-pinned client); it stays
# inert until the founder enables it — CI-0009.) Keep the review path diff-only
# if the reusable is ever edited.
permissions:
  contents: write        # reusable auto-merge fallback (gh pr merge via GITHUB_TOKEN)
  pull-requests: write   # trust-gate + verdict comments + label set
  issues: write          # gh api label create/apply paths
jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/ai-review.yml@ci/v2.11.0
    with:
      # Model selection is CONFIG-DRIVEN: the reusable reads `litellm.model`
      # from the trusted .github/ai-review/config.json. Uncomment to override:
      # model: ai-reviewer
      runner_labels_routine: '["self-hosted", "ci-runner", "single-use"]'
      runner_labels_review: '["self-hosted", "ci-runner", "single-use"]'
      # Private HTTP proxies require explicit opt-in:
      # litellm_allow_insecure_http: true
      # External adopters: point the trust config at YOUR ops/config repo
      # (holds `.github/ai-review/config.json`). Defaults to
      # vladm3105/aidoc-flow-operations@main.
      # trust_config_repo: your-org/your-ops-repo
      # trust_config_ref: main
      # NOTE: this override does NOT yet reach the composition gate, which reads
      # the consumer repo's own .github/ai-review/config.json@main (FT-6).
    # FT-42: explicit least-privilege map (was `secrets: inherit`). Only the
    # secrets this reusable declares are forwarded; an unset one passes empty and
    # the matching flow self-skips (reusable inputs are all `required: false`).
    secrets:
      APP_REVIEWER_1_ID: ${{ secrets.APP_REVIEWER_1_ID }}
      APP_REVIEWER_1_KEY: ${{ secrets.APP_REVIEWER_1_KEY }}
      APP_AUTOFIX_ID: ${{ secrets.APP_AUTOFIX_ID }}
      APP_AUTOFIX_KEY: ${{ secrets.APP_AUTOFIX_KEY }}
      AI_REVIEW_TOKEN: ${{ secrets.AI_REVIEW_TOKEN }}
      LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
      LITELLM_REVIEW_API_KEY: ${{ secrets.LITELLM_REVIEW_API_KEY }}
      LITELLM_FIX_API_KEY: ${{ secrets.LITELLM_FIX_API_KEY }}
