# IPLAN-0026 Phase 2 (ci/v1.3.0): dropped `pull_request_target` trigger
# from the recommended install-template set. Phase 1 (ci/v1.2.0) shipped
# the `workflow_run` mechanism alongside `pull_request_target` for safety
# during the transition. Phase 2 drops `pull_request_target` and delivers
# the actual friction relief — every composition fire now corresponds to
# a real state change (the consumer's `ai-review` caller completed, OR a
# review was submitted/dismissed/edited) rather than firing pre-emptively
# on PR open + creating the stale-red FAILURE that branch-protection's
# rollup retained until a `skip-ai-review` label-cycle.
#
# The fully-superseded Phase-1 trigger set (KEPT here as commit history for
# reference) was:
#   pull_request_target:
#     types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
# Existing consumers can still locally override and re-add it if they have
# a flow that depends on it; the Phase-2 install template no longer
# inherits it.
#
# Reusable composition.yml body (v1.2.0+) already handles BOTH event shapes
# (`pull_request_review` AND `workflow_run`) via `||` fallback expressions
# — see aidoc-flow-ci/.github/workflows/composition.yml — so dropping
# `pull_request_target` here does not require any reusable-side change.
name: composition
on:
  pull_request_review:
    types: [submitted, dismissed, edited]
  workflow_run:
    # Fires AFTER consumer's `ai-review` caller completes (any conclusion:
    # success / failure / skipped / cancelled — `types: [completed]` covers
    # all terminal states). Covers routine-approve, routine-reject,
    # skip-ai-review-carry, and ai-review-infra-failure scenarios without
    # the wasted early-fire `pull_request_target` run that created the
    # stale-red.
    workflows: ["ai-review"]
    types: [completed]
permissions:
  pull-requests: read
  contents: read

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/composition.yml@ci/v2.13.0
    with:
      runner_labels: '["self-hosted", "ci-runner", "single-use"]'
    # No `secrets:` block — composition reads only the automatic GITHUB_TOKEN
    # (FT-27 least-privilege; `inherit` would hand it every repo secret).
