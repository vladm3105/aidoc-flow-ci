# v1.0.0 trigger shape per aidoc-flow-operations PR #111 (conservative
# pre-Phase-B): pull_request_target [synchronize, labeled, unlabeled] +
# pull_request_review. `synchronize` (push) is needed for the
# skip-ai-review carry-forward path. Full workflow_run redesign is the
# Phase-B target (IPLAN-0017 §3.4) when the composition body can be
# rewritten to handle github.event.workflow_run.pull_requests[0].
name: composition
on:
  pull_request_target:
    types: [synchronize, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed, edited]
jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/composition.yml@ci/v1.0.6
    with:
      runner_labels: '"runner-self"'
    secrets: inherit  # pragma: allowlist secret
