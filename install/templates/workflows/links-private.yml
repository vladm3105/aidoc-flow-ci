# Caller template for aidoc-flow-ci's reusable links workflow.
# PRIVATE variant → self-hosted ci-runner/single-use pool (OPS-0049; never
# ubuntu-latest). PUBLIC consumers use links.yml. Generated to match the wizard's
# runner_labels injection so install.sh --update resolves a labeled file for
# private repos instead of the label-less generic (which would revert to
# ubuntu-latest and queue forever).
#
#
# Two jobs: internal (PR-blocking; offline only) and external (cron;
# non-blocking; opens issue on failure if you wire one in).
#
# Companion starter config: copy install/templates/.lychee.toml to
# your repo root for sensible defaults (caching, 429-tolerance,
# excluded hosts that 403 on automated UA).

name: links

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # weekly Mon 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  internal:
    name: internal links (blocking)
    if: github.event_name != 'schedule'
    uses: vladm3105/aidoc-flow-ci/.github/workflows/links.yml@ci/v2.1.2
    with:
      runner_labels: '["self-hosted", "ci-runner", "single-use"]'
      mode: internal
      fail-on-error: true

  external:
    name: external links (non-blocking)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: vladm3105/aidoc-flow-ci/.github/workflows/links.yml@ci/v2.1.2
    with:
      runner_labels: '["self-hosted", "ci-runner", "single-use"]'
      mode: external
      fail-on-error: false
