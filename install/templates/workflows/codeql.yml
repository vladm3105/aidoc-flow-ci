# Caller template for aidoc-flow-ci's reusable codeql workflow.
#
# Triggers per GitHub's recommended pattern: push + PR to default
# branch + weekly cron + workflow_dispatch. Cron is staggered (Mon
# 14:20 UTC = ~10:20 EST / 7:20 PST) to avoid contention with other
# weekly jobs.
#
# Adjust the `languages` input to match your repo. Default ["actions"]
# scans the workflows themselves — every consumer benefits. Add other
# languages as appropriate (e.g., '["actions","python","javascript-typescript"]').

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '20 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/codeql.yml@ci/v1.7.0
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      languages: '["actions"]'
      # PRIVATE consumers override:
      # runner_labels: '"runner-self"'
