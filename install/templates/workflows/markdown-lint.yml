# Caller template for aidoc-flow-ci's reusable markdown-lint workflow.
#
# Single template (works for both PRIVATE + PUBLIC). The reusable
# workflow uses markdownlint-cli2-action which is lightweight + fast
# on ubuntu-latest. PRIVATE consumers per OPS-0049 may override
# runner_labels to '"runner-self"'.
#
# Companion starter config: copy install/templates/.markdownlint.json
# to your repo root for sensible rule defaults (or rely on cli2's
# auto-resolve and ship your own).

name: markdown-lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/markdown-lint.yml@ci/v1.0.6
    with:
      globs: |
        **/*.md
        !node_modules
        !vendor
        !.git
    # PRIVATE consumers override:
    # with:
    #   runner_labels: '"runner-self"'
