# Caller template for aidoc-flow-ci's reusable markdown-lint workflow.
# PRIVATE variant → self-hosted ci-runner/single-use pool (OPS-0049; never
# ubuntu-latest). PUBLIC consumers use markdown-lint.yml. Generated to match the wizard's
# runner_labels injection so install.sh --update resolves a labeled file for
# private repos instead of the label-less generic (which would revert to
# ubuntu-latest and queue forever).
#
#
# Single template (works for both PRIVATE + PUBLIC). The reusable installs
# markdownlint-cli2 via npm (ci/v1.9.4+; no blocked third-party action).
# PRIVATE consumers per OPS-0049 override runner_labels to
# '["self-hosted", "ci-runner", "single-use"]'.
#
# Companion starter config: copy install/templates/.markdownlint.json
# to your repo root for sensible rule defaults (or rely on cli2's
# auto-resolve and ship your own).
#
# ROLLOUT: a repo with existing markdown carries lint debt. To adopt WITHOUT
# bricking merges, set `fail-on-findings: false` (report-only — cli2 still
# emits ::error PR annotations but the job exits 0). Graduate to blocking
# (drop the flag; default is true) after a `markdownlint-cli2 --fix` pass +
# adding the check to branch protection.
# NOTE: `continue-on-error` is ILLEGAL on a reusable-call job — use the
# `fail-on-findings` input for report-only, never continue-on-error.

name: markdown-lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/markdown-lint.yml@ci/v2.1.2
    with:
      runner_labels: '["self-hosted", "ci-runner", "single-use"]'
      globs: |
        **/*.md
        !node_modules
        !vendor
        !.git
      # Report-only rollout (recommended for a repo with existing lint debt):
      # fail-on-findings: false
