# Caller template for aidoc-flow-ci's reusable docs-sync workflow.
# PROTECTED caller — uniform on PUBLIC and PRIVATE repos (PLAN-013): runs on the
# ephemeral self-hosted single-use pool regardless of visibility (no
# `-public`/`-private` split; a visibility flip is a no-op). Safe on public repos
# because this is a POST-MERGE flow (`push: main`) — a fork PR cannot trigger it.
#
# Per IPLAN-0018 (post-merge mechanical doc-sync; ships as ci/v1.1.0-alpha.1).
#
# This is OPT-IN: consumer must drop this file into .github/workflows/ AND
# provide .github/docs-sync.json (template available in install/templates/).
#
# PREREQUISITES (per IPLAN-0018 §3.4, §3.5):
#   - 🔴 founder creates aidoc-flow-bot App + installs on this consumer repo
#     (separate from aidoc-reviewer for separation of concerns; per-installation
#     short-lived token; branch-protection bypass scoped to this App only)
#   - secrets AIDOC_FLOW_BOT_ID + AIDOC_FLOW_BOT_KEY set on consumer
#   - consumer's .github/docs-sync.json configured (start with dry_run: true)
#
# ROLLOUT (per IPLAN-0018 §3.7):
#   P3 — operations pilots in dry-run mode for 1 week
#   P4 — graduates to live mode after ≥5 merges with zero proposed-vs-applied
#        file-set divergence
#   P6 — ci/v1.1.0 stable; framework opts in
#   P7 — Phase C consumers opt in as they adopt aidoc-flow-ci

name: docs-sync

on:
  push:
    branches: [main]

permissions:
  contents: read
  # `write`, not `read`: in DRY-RUN the reusable posts its proposed edits as a PR
  # comment (`gh pr comment`), which needs `pull-requests: write`. A callee cannot
  # grant its own permissions — the caller must. With `read` the job fails 403
  # exactly when it has something to report, and is green only when idle.
  pull-requests: write

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/docs-sync.yml@ci/v2.10.0
    with:
      runner_labels: '["self-hosted", "ci-runner", "single-use"]'
    secrets: inherit  # pragma: allowlist secret
