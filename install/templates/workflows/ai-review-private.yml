name: ai-review
on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  pull_request_review:
    types: [submitted]
jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/ai-review.yml@ci/v1.0.0
    with:
      reviewer: codex
      runner_labels_routine: '["self-hosted", "aidoc", "ci-ephemeral"]'
      runner_labels_review:  '["self-hosted", "aidoc", "ai-review"]'
    secrets: inherit
