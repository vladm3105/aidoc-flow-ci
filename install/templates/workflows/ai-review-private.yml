name: ai-review
on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  pull_request_review:
    types: [submitted]
jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/ai-review.yml@ci/v1.7.0
    with:
      reviewer: codex
      runner_labels_routine: '"runner-self"'
      runner_labels_review: '"runner-self"'
    secrets: inherit  # pragma: allowlist secret
