# Caller template for aidoc-flow-ci's reusable secret-scan workflow.
# PRIVATE variant → self-hosted ci-runner/single-use pool (OPS-0049; never
# ubuntu-latest). PUBLIC consumers use secret-scan.yml. Generated to match the wizard's
# runner_labels injection so install.sh --update resolves a labeled file for
# private repos instead of the label-less generic (which would revert to
# ubuntu-latest and queue forever).
#
#
# Default config (gitleaks built-in ruleset) is sufficient for ~90%
# of repos. Add install/templates/.gitleaks.toml to your repo only
# if you need custom allowlists (test fixtures, docs examples).

name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/secret-scan.yml@ci/v2.7.0
    with:
      runner_labels: '["self-hosted", "ci-runner", "single-use"]'
      # Optional: uncomment to supply a custom gitleaks allowlist.
      # config-path: .gitleaks.toml
    permissions:
      contents: read
      security-events: write
