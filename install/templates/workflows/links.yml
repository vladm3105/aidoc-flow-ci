# Caller template for aidoc-flow-ci's reusable links workflow.
#
# Two jobs: internal (PR-blocking; offline only) and external (cron;
# non-blocking; opens issue on failure if you wire one in).
#
# Companion starter config: copy install/templates/.lychee.toml to
# your repo root for sensible defaults (caching, 429-tolerance,
# excluded hosts that 403 on automated UA).

name: links

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # weekly Mon 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  internal:
    name: internal links (blocking)
    if: github.event_name != 'schedule'
    uses: vladm3105/aidoc-flow-ci/.github/workflows/links.yml@ci/v1.8.1
    with:
      mode: internal
      fail-on-error: true

  external:
    name: external links (non-blocking)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: vladm3105/aidoc-flow-ci/.github/workflows/links.yml@ci/v1.8.1
    with:
      mode: external
      fail-on-error: false
