# Caller template for aidoc-flow-ci's reusable audit-trail-check workflow.
# OPS-0069 audit-trail phrase gate — belt-and-suspenders CI check for the local
# pre-push hook: verifies every non-exempt PR carries the OPS-0065/0069
# audit-trail phrase in a commit body. Renders as `call / verify`.
# Requires the `skip-audit-trail` canon label in the repo (two-signal skip).
# PRIVATE variant → self-hosted ci-runner/single-use pool (OPS-0049; never ubuntu-latest).
name: audit-trail

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/audit-trail-check.yml@ci/v2.0.0
    with:
      runner_labels: '["self-hosted", "ci-runner", "single-use"]'
    permissions:
      contents: read
      pull-requests: read
