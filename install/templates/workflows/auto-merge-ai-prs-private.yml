# Caller for vladm3105/aidoc-flow-ci/.github/workflows/auto-merge-ai-prs.yml.
# PRIVATE consumer variant — uses self-hosted ci-runner/single-use runners.
# Auto-merge enforcer added in ci/v1.5.0 (IPLAN-0030 P3); the caller pin is the uses: line below.
#
# See the -public.yml sibling for narrative on trigger architecture +
# App-token requirements. The only difference is runner_labels.
name: auto-merge-ai-prs

on:
  workflow_run:
    workflows: ["ai-review", "composition"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to attempt re-arm on (positive integer required)"
        type: string
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  call:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: vladm3105/aidoc-flow-ci/.github/workflows/auto-merge-ai-prs.yml@ci/v2.4.0
    with:
      pr_number: ${{ github.event.workflow_run.pull_requests[0].number || inputs.pr_number || '' }}
      runner_labels: '["self-hosted", "ci-runner", "single-use"]'
      # External adopters: MUST match ai-review.yml's trust config repo/ref.
      # Defaults to vladm3105/aidoc-flow-operations@main.
      # trust_config_repo: your-org/your-ops-repo
      # trust_config_ref: main
    secrets: inherit  # pragma: allowlist secret
