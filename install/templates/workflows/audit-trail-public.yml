# Caller template for aidoc-flow-ci's reusable audit-trail-check workflow.
# OPS-0069 audit-trail phrase gate — belt-and-suspenders CI check for the local
# pre-push hook: verifies every non-exempt PR carries the OPS-0065/0069
# audit-trail phrase in a commit body. Renders as `call / verify`.
# Requires the `skip-audit-trail` canon label in the repo (two-signal skip).
# PUBLIC variant (ubuntu-latest). PRIVATE consumers use audit-trail-private.yml.
name: audit-trail

on:
  pull_request:
    # `labeled, unlabeled` are load-bearing, not cosmetic: the reusable's
    # documented escape hatch is the two-signal override (the `skip-audit-trail`
    # LABEL + a commit-body marker). Without a `labeled` trigger, applying the
    # label fires no event, so the check never re-runs and the red check never
    # clears — the operator is told to apply a label that cannot take effect and
    # has to push an empty commit instead. ai-review's callers already include
    # these; audit-trail was the outlier.
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/audit-trail-check.yml@ci/v2.11.0
    permissions:
      contents: read
      pull-requests: read
