# Consumer yamllint profile (PLAN-015 M4). Read by the installed pre-push hook
# (scripts/pre_push_check.sh, which uses `-c .yamllint.yaml` when present) and by
# any yamllint CI you wire.
#
# WHY this ships: without a config, yamllint runs its 80-char default, which
# floods SDD YAML — BRD/PRD/IPLAN artifacts author long natural-language prose in
# `description:` / `business_driver:` / `changes:` fields — with hundreds of
# line-length errors that are normal for that use case (measured: ~300 on a fresh
# consumer). This profile relaxes the prose-hostile rules while keeping structural
# signal. TUNE IT for your repo's conventions — it is a starting point, not canon
# (canon's own .yamllint.yaml is deliberately stricter-disabled for its
# workflow-heavy YAML; a consumer's needs differ).
extends: relaxed
rules:
  # SDD prose YAML routinely exceeds 80; warn past 120 rather than error, and
  # never flag a long unbreakable token (a URL, a JSON-array runner_labels line).
  line-length:
    max: 120
    level: warning
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  # `---` document-start is optional for single-doc config files.
  document-start: disable
  # yes/no/on/off as strings in prose values are fine.
  truthy:
    level: warning
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
