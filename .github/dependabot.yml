# dependabot.yml — pruned for aidoc-flow-ci (PLAN-007 W5).
#
# This repo ships reusable workflows + shell scripts + docs — NO pip/npm/docker/
# gitsubmodule manifests. The canonical multi-ecosystem template
# (install/templates/dependabot.yml) says "enable only ecosystems present in the
# target repo"; the un-pruned copy enabled 4 orphan ecosystems that generated
# recurring Dependabot update errors. Pruned to github-actions only.
#
# Auto-merge policy: Dependabot PRs pass through ai-review + composition +
# auto-merge-ai-prs on green (per auto_merge.repos); aidoc-flow-ci is
# governance/product tier — human review of CI-pin bumps is the trust boundary.

version: 2
updates:
  # Bump the SHA/tag pins on third-party actions used in .github/workflows/.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      github-actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    labels:
      - dependencies
