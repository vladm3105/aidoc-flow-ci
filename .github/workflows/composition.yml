# composition — IPLAN-0016 §2a-v3 (A4). The AUTHORITATIVE identity gate for counting AI approvals.
#
# WHY THIS EXISTS: a GitHub App can submit an approving review but CANNOT be a CODEOWNER (and can't be
# request_reviewers'd), so "require review from Code Owners" can't make the reviewer App's approval
# *required*. This required status check encodes that rule instead: on a routine PR it is GREEN only when,
# at the CURRENT head SHA, an APPROVED review exists from the reviewer App — matched on the App's bot-user
# NUMERIC id (the login string is spoofable) + user.type == "Bot". It is the SOLE identity enforcement, so
# it must stay in branch protection's required-checks set (removing it is a governance change).
#
# RE-RUNS ON `pull_request_review` so it flips GREEN the moment the App's approval lands (the ai-review job
# submits that review; we must re-evaluate without re-running the heavy reviewer CLI — hence a SEPARATE,
# lightweight workflow). Reads PR review metadata only via the GITHUB_TOKEN; never checks out or runs PR code.
#
# IPLAN-0026 P1 (ci/v1.2.0): body now handles TWO event-shape sources for PR data:
#   1. pull_request_review event → `github.event.pull_request.*` (the original shape)
#   2. workflow_run event (after ai-review completes) → `github.event.workflow_run.pull_requests[0].*`
# The env block uses `||` expressions to source from whichever shape is non-empty per event. Per IPLAN-0026
# §2.1 fork-edge-case: workflow_run from a fork PR has empty `pull_requests[]` → body detects + early-exits
# (forks are already routed to HUMAN-REVIEW-ONLY by ai-review; composition exempts them via the IS_FORK
# branch below regardless of trigger). The reusable itself stays `workflow_call:` only; the new triggers
# live on the consumer caller templates (composition-{private,public}.yml) per IPLAN-0026 §2.3.
#
# INERT / EXEMPT (passes green, never blocks): when `vars.APP_REVIEWER_1_BOT_ID` is unset (App not yet
# wired); on a governance-locked PR (human-merge — must not double-block); and on a fork / non-allowlisted-
# author PR (ai-review routes those to HUMAN-REVIEW-ONLY and skips the reviewer, so the App never approves —
# composition must not strand them). Arming = set the repo variable to the App's bot-user id (printed by
# scripts/verify_app_review_counts.sh, G1) + add `composition` to required checks (A6).
name: composition

on:
  workflow_call:
    inputs:
      runner_labels:
        description: 'JSON array of runner labels. Default ubuntu-latest (safe for both public + private consumers; private consumers typically override with their self-hosted ci-runner/single-use label set).'
        type: string
        default: '"ubuntu-latest"'

permissions:
  pull-requests: read
  contents: read

# Serialize per-PR evaluations, but NEVER cancel an in-flight run: the run started by the App's
# `pull_request_review:submitted` is exactly the one that records the check GREEN — cancelling it (a
# cancelled required check is NOT success) would leave a satisfied PR permanently blocked. Runs are cheap
# (`gh api` only); let each complete so the latest evaluation for a given head SHA wins.
# Concurrency group: per-PR; uses `||` fallback over both event shapes per IPLAN-0026 §2.1 D7. For
# pull_request_review events the LHS resolves; for workflow_run the RHS resolves. For the fork-edge-case
# (workflow_run from fork PR with empty pull_requests[]) both sides resolve to empty → global serialization
# on group `composition-` is harmless because the body exits early in that case (per §2.1 fork-detection).
concurrency:
  group: composition-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: false

jobs:
  composition:
    # Run on workflow_run events unconditionally (they only fire from the ai-review workflow completing —
    # exactly when composition should re-evaluate). On label events, run only for `skip-ai-review` (other
    # label writes shouldn't re-trigger). Non-label events (pull_request_review, etc.) always run.
    if: ${{ github.event_name == 'workflow_run' || (github.event.action != 'labeled' && github.event.action != 'unlabeled') || github.event.label.name == 'skip-ai-review' }}
    # Private repo → ci-runner/single-use self-hosted (this account has no GitHub-hosted minutes, OPS-0049);
    # public repo → GitHub-hosted. Lightweight: only `gh api` calls, no checkout of PR code.
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 10
    steps:
      - name: Assert a counting reviewer-App approval at head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # IPLAN-0026 P1: each field uses `||` fallback so PR data sources from whichever event shape is
          # non-empty. LHS = pull_request_review; RHS = workflow_run. For fork PRs on workflow_run both sides
          # may evaluate to empty (GitHub omits pull_requests[] when source workflow ran from a fork); the
          # body's fork-detection branch below handles that case.
          PR: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.workflow_run.pull_requests[0].head.sha }}
          EXPECTED_ID: ${{ vars.APP_REVIEWER_1_BOT_ID }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork || github.event.workflow_run.pull_requests[0].head.repo.fork }}
          # AUTHOR: only the pull_request_review event carries the full PR object here. The workflow_run
          # payload's abbreviated pull_requests[] does NOT include `.user`, and `workflow_run.actor` is the
          # actor who triggered ai-review (e.g. the label-APPLIER on a labeled event), NOT the PR author —
          # so the old `|| workflow_run.actor.login` fallback mis-identified the author. On the workflow_run
          # path AUTHOR is resolved shape-agnostically via gh-api in the body (same pattern as SKIP_REVIEW).
          AUTHOR: ${{ github.event.pull_request.user.login }}
          # SKIP_REVIEW + AUTHOR (workflow_run path) resolved via gh-api below (the workflow_run payload
          # doesn't include PR labels or the PR author; gh-api is the shape-agnostic source per IPLAN-0026
          # §2.1 D10).
        run: |
          set -uo pipefail

          # The self-hosted runner's api.github.com is intermittently flaky; a transient failure must NEVER
          # read as "no approval" (that would FALSE-block a satisfied PR). Every gh-api call below is retried.

          # IPLAN-0026 P1 fork edge case: workflow_run from a fork PR has empty pull_requests[] → both
          # `||` fallback expressions above resolve to empty strings → exit cleanly. Forks are HUMAN-REVIEW-
          # ONLY (ai-review never approves them) so composition must NOT block them; the IS_FORK branch
          # below covers the same case for pull_request_review-triggered runs.
          if [ -z "${PR:-}" ]; then
            echo "::notice::composition: empty PR number from event payload (workflow_run from fork PR with empty pull_requests[], or non-PR event) — passing without enforcement."
            exit 0
          fi

          # INERT until armed — the check passes so it never blocks before the App is wired.
          if [ -z "${EXPECTED_ID:-}" ]; then
            echo "::notice::composition INERT — vars.APP_REVIEWER_1_BOT_ID is not set (reviewer App not yet armed). Passing."
            exit 0
          fi
          case "$EXPECTED_ID" in ''|*[!0-9]*) echo "::error::APP_REVIEWER_1_BOT_ID must be the App bot-user NUMERIC id (got '$EXPECTED_ID')"; exit 1;; esac

          # SKIP_REVIEW resolved via gh-api (shape-agnostic; the workflow_run payload doesn't include PR
          # labels). Retried for the same flaky-api reason as the loops below. Default to empty (no skip)
          # on persistent failure — fail-closed enforces the App-approval requirement.
          SKIP_REVIEW=""
          for n in 1 2 3 4; do
            # `index("x")` — NOT `contains(["x"])`. jq's array `contains` does SUBSTRING matching on string
            # elements, so a label merely CONTAINING the name (`skip-ai-review-exempt`,
            # `no-skip-ai-review-here`) set SKIP_REVIEW=1 without anyone applying the real label — and
            # auto-merge-ai-prs.yml already uses `index()`, so the two workflows classified the same PR
            # differently. `index()` is exact. (Residual risk was narrow because the carry-forward branch
            # below still demands an App-approved tree-matching commit, but the mismatch itself is a bug.)
            SKIP_REVIEW=$(gh api "repos/$GH_REPO/pulls/$PR" --jq '[.labels[].name] | index("skip-ai-review") | if . != null then "1" else "" end' 2>/dev/null) && break
            [ "$n" -lt 4 ] && sleep $((n*3))
          done

          # CARRY-FORWARD (PLAN-005 PR-A part 2 / D2): skip-ai-review is ADVISORY, not authorization. It
          # carries a PRIOR App approval forward across TRIVIAL pushes (rebase / label-cycle §15) — it must
          # NOT pass un-reviewed code. Carry forward ONLY if the App APPROVED some commit whose CONTENT
          # (git tree SHA) is identical to HEAD, i.e. nothing was pushed since the approval. §15 leaves the
          # approval AT HEAD, so its tree matches → still carries. If the content changed since the last
          # approval (approve-benign-then-push-malicious), do NOT carry — fall through to ENFORCE (require
          # an App-APPROVED review AT HEAD). NB only a no-op / same-base rebase keeps the tree; a rebase
          # onto an ADVANCED base changes it → NOT carried (fresh review needed; troubleshooting §15).
          # Fail-closed: any fetch failure → no carry → ENFORCE.
          if [ "${SKIP_REVIEW:-}" = "1" ]; then
            asha_raw=""
            for n in 1 2 3 4; do
              asha_raw=$(gh api "repos/$GH_REPO/pulls/$PR/reviews" --paginate \
                -q ".[] | select(.user.id == ($EXPECTED_ID) and .user.type == \"Bot\" and .state == \"APPROVED\") | .commit_id" 2>/dev/null) && break
              [ "$n" -lt 4 ] && sleep $((n*3))
            done
            asha=$(printf '%s\n' "$asha_raw" | grep -v '^$' | tail -1)
            carry_ok=
            if [ -n "$asha" ]; then
              if [ "$asha" = "${HEAD_SHA:-}" ]; then
                carry_ok=1
              else
                atree=$(gh api "repos/$GH_REPO/git/commits/$asha" -q '.tree.sha' 2>/dev/null || echo "")
                htree=$(gh api "repos/$GH_REPO/git/commits/${HEAD_SHA:-}" -q '.tree.sha' 2>/dev/null || echo "")
                [ -n "$atree" ] && [ "$atree" = "$htree" ] && carry_ok=1
              fi
            fi
            if [ -n "$carry_ok" ]; then
              echo "::notice::composition carried forward — 'skip-ai-review' present and HEAD content == an App-approved commit's content (approval $asha; no re-review needed). Passing."
              exit 0
            fi
            echo "::warning::skip-ai-review present but the content changed since the last App approval (or the App has never approved) — NOT carrying forward; enforcing the App-approval-at-HEAD requirement. skip-ai-review carries a prior approval across trivial pushes only. (PLAN-005 PR-A part 2 / D2.)"
            # fall through to the trust gate + ENFORCE below (do NOT exit 0).
          fi

          # AUTHOR resolution for the workflow_run path (empty from the abbreviated event payload; see the
          # env note above). Fetch the real PR author by number — same shape-agnostic gh-api source + retry
          # as SKIP_REVIEW. Fail-closed to empty: an empty author is not in trust.ai_review, so the trust
          # gate below ENFORCES App-approval (the safe default — a broken read must not earn an exemption).
          if [ -z "${AUTHOR:-}" ]; then
            for n in 1 2 3 4; do
              AUTHOR=$(gh api "repos/$GH_REPO/pulls/$PR" --jq '.user.login' 2>/dev/null) && [ -n "$AUTHOR" ] && break
              [ "$n" -lt 4 ] && sleep $((n*3))
            done
          fi

          # TRUST GATE (mirror ai-review.yml). Fork / non-allowlisted authors are HUMAN-REVIEW-ONLY there —
          # the reviewer job is skipped, so the App will NEVER approve their PR. composition must NOT block
          # them (else a human-reviewed PR is permanently stuck). Read the trusted allowlist from the repo's
          # DEFAULT BRANCH — the protected, non-PR-mutable base (a PR modifies a feature branch, never the
          # base), so it keeps the "a PR can't change it" property while unblocking consumers whose default is
          # master/develop, not main (FT-6 / PLAN-005 PR-G). Fail-closed = ENFORCE if the config can't be read
          # (an attacker must not earn an exemption by breaking the read; a trusted author's App approval still
          # arrives and clears it).
          if [ "${IS_FORK:-}" = "true" ]; then
            echo "::notice::fork PR from ${AUTHOR:-?} — human-review-only; composition not enforced (pass)."
            exit 0
          fi
          # Resolve the default branch ($GH_REPO is github.repository — trusted, not PR-controlled). Fall back
          # to `main` if the lookup fails (fail-safe: same behavior as before PLAN-005 PR-G).
          DEFAULT_BRANCH=$(gh api "repos/$GH_REPO" -q '.default_branch' 2>/dev/null)
          [ -n "$DEFAULT_BRANCH" ] || DEFAULT_BRANCH=main
          CFG=$(mktemp); cfg_err=$(mktemp); cfg_ok=
          # 7 attempts × backoff capped at 20s places the FINAL attempt at
          # t≈63s (after sleeps of 3+6+9+12+15+18s between attempts 1-7).
          # No sleep AFTER the final attempt (the original 6-attempt design
          # wasted the last sleep without making another request, so the
          # claimed "~63s budget" actually peaked at t=45s — caught by
          # ai-reviewer on PR #105). Real multi-minute outages still
          # fail-closed (the right behavior). Both retry loops use the
          # same shape.
          for n in 1 2 3 4 5 6 7; do
            if gh api "repos/$GH_REPO/contents/.github/ai-review/config.json?ref=$DEFAULT_BRANCH" -q '.content' 2>"$cfg_err" | base64 -d > "$CFG" 2>/dev/null && [ -s "$CFG" ]; then cfg_ok=1; break; fi
            # Capture the actual stderr from gh (or note when gh itself is missing)
            # so a future failure surfaces its real cause, not a hardcoded
            # "(api.github.com)" string that previously cost hours of debugging
            # when the real cause was `gh: not found` in the runner image.
            cfg_reason=$(head -3 "$cfg_err" 2>/dev/null | tr '\n' ' ' | head -c 240)
            command -v gh >/dev/null 2>&1 || cfg_reason="gh CLI not installed in runner image — rebuild via scripts/ci-runner/build-image.sh (Dockerfile bakes gh atop actions-runner:latest). ${cfg_reason}"
            echo "::warning::config.json read attempt $n failed: ${cfg_reason:-(no stderr captured)} — retrying"
            [ "$n" -lt 7 ] && sleep $(( n*3 < 20 ? n*3 : 20 ))
          done
          # SCHEMA-VALIDATE BEFORE TRUSTING THE PARSE. `cfg_ok` above proves only that the READ returned
          # non-empty BYTES — not that they parse. Without this gate the exemption below fires on ANY non-zero
          # jq exit, and jq exits non-zero for reasons that are not "author absent":
          #   author absent from a valid list -> exit 1  (the ONLY intended exemption)
          #   malformed JSON                  -> exit 4  -> exemption fired -> PASS
          #   valid JSON, .trust.ai_review renamed/absent -> exit 1 -> exemption fired -> PASS
          # So one bad hand-edit to config.json on the default branch exempted EVERY author on EVERY PR —
          # including trusted ones — silently turning this gate (the sole App-approval enforcement) green
          # fleet-wide. The file's fail-closed contract above covers a broken READ; a broken PARSE is the
          # same threat and must fail the same way. Mirrors auto-merge-ai-prs.yml's schema check, which
          # already distinguishes "config malformed" from "PR genuinely not allowlisted".
          # NB fail-closed here means ENFORCE (fall through), the OPPOSITE polarity to auto-merge's
          # fail-closed `exit 0` — there "safe" is refuse-to-merge, here "safe" is refuse-to-exempt.
          if [ -n "$cfg_ok" ] && ! jq -e '(.trust.ai_review | type == "array")' "$CFG" >/dev/null 2>&1; then
            cfg_parse_err=$(jq -e '.' "$CFG" 2>&1 | head -3 | tr '\n' ' ' || echo "(jq error)")
            echo "::warning::trusted config.json on '$DEFAULT_BRANCH' failed schema validation (expected .trust.ai_review to be an array) — fail-closed (enforcing the App-approval requirement). Fix the config; jq: ${cfg_parse_err}"
            cfg_ok=
          fi
          if [ -n "$cfg_ok" ]; then
            # Exempt (pass) ONLY a non-empty author who is not in the allowlist. An EMPTY author (the
            # workflow_run gh-api fetch exhausted its retries) must NOT earn the exemption — it falls through
            # to ENFORCE below, matching this file's fail-closed philosophy (a broken read never grants a
            # pass; a trusted author's real App approval still arrives and clears the check).
            # Safe to treat a non-zero jq here as "author absent": the schema gate above has already proven
            # the file parses AND that .trust.ai_review is an array, so exit 4 / missing-key are excluded.
            if [ -n "${AUTHOR:-}" ] && ! jq -e --arg a "$AUTHOR" '(.trust.ai_review // []) | index($a)' "$CFG" >/dev/null 2>&1; then
              echo "::notice::author ${AUTHOR} not in trust.ai_review — human-review-only; composition not enforced (pass)."
              exit 0
            fi
          else
            echo "::warning::could not read OR validate trusted config.json from '$DEFAULT_BRANCH' — fail-closed (enforcing the App-approval requirement). See the preceding warning for the specific cause (read miss vs schema failure)."
          fi

          # GOVERNANCE FLOOR (same globs as the ai-review gate). Governance-locked PRs are human-merge; this
          # check must NOT double-block them (the reviewer App never approves them by design). Fail-closed =
          # ENFORCE: if the changed-file list can't be proven complete, we do NOT exempt (a routine PR must
          # never slip through unenforced just because a blip hid a non-governance file list).
          FILES=$(mktemp)
          for i in 1 2 3 4; do gh api --paginate "repos/$GH_REPO/pulls/$PR/files" -q '.[].filename' > "$FILES" 2>/dev/null && [ -s "$FILES" ] && break; sleep $((i*3)); done
          CHANGED_N=""; for i in 1 2 3 4; do CHANGED_N=$(gh api "repos/$GH_REPO/pulls/$PR" -q '.changed_files' 2>/dev/null) && [ -n "$CHANGED_N" ] && break; sleep $((i*3)); done
          LISTED_N=$(grep -c '' "$FILES" 2>/dev/null || echo 0)
          COMPLETE=true
          [ -s "$FILES" ] || COMPLETE=false
          case "$CHANGED_N" in ''|*[!0-9]*) COMPLETE=false;; *) [ "$LISTED_N" -ge "$CHANGED_N" ] || COMPLETE=false;; esac
          LOCKED=false
          if [ "$COMPLETE" = "true" ] && grep -qE '(^|/)governance/|(^|/)\.github/|(^|/)templates/ai-review/' "$FILES"; then LOCKED=true; fi
          case "$GH_REPO" in */aidoc-flow-framework) LOCKED=true;; esac
          if [ "$LOCKED" = "true" ]; then
            echo "::notice::governance-locked PR (listed ${LISTED_N}/changed ${CHANGED_N:-?}) → human-merge; composition not enforced (pass)."
            exit 0
          fi

          # ENFORCE: an APPROVED review from the reviewer App (numeric id + type Bot) tied to THIS head SHA.
          # RETRY the API fetch — `gh api` exits non-zero on an HTTP failure (→ retry), while a genuine
          # "no matching review" exits 0 with empty output (→ real block). Without this, ONE network blip on
          # the flaky runner reads as "no approval" and FALSE-blocks a PR the App already approved. Streams
          # matching review ids across pages (a per-page length would miscount).
          ids=""; fetched=; rev_err=$(mktemp)
          # Same shape as the config-fetch loop above: 7 attempts × backoff
          # capped at 20s, FINAL attempt at t≈63s, no trailing sleep. The
          # fail-closed-as-INFRASTRUCTURE annotation below correctly
          # distinguishes a real outage from a "no approval at head" verdict
          # (which has its own exit path further down).
          for n in 1 2 3 4 5 6 7; do
            if ids=$(gh api "repos/$GH_REPO/pulls/$PR/reviews" --paginate \
                  -q ".[] | select(.user.id == ($EXPECTED_ID) and .user.type == \"Bot\" and .state == \"APPROVED\" and .commit_id == \"$HEAD_SHA\") | .id" 2>"$rev_err"); then
              fetched=1; break
            fi
            # Capture the actual stderr from gh so a future failure surfaces its
            # real cause (e.g. `gh: not found`, auth failure, rate-limit) rather
            # than the hardcoded "(api.github.com)" string that previously
            # hid a `gh CLI missing in runner image` bug.
            rev_reason=$(head -3 "$rev_err" 2>/dev/null | tr '\n' ' ' | head -c 240)
            command -v gh >/dev/null 2>&1 || rev_reason="gh CLI not installed in runner image — rebuild via scripts/ci-runner/build-image.sh. ${rev_reason}"
            echo "::warning::reviews fetch attempt $n failed: ${rev_reason:-(no stderr captured)} — retrying"
            [ "$n" -lt 7 ] && sleep $(( n*3 < 20 ? n*3 : 20 ))
          done
          if [ -z "$fetched" ]; then
            echo "::error::could not fetch PR reviews after retries — INFRASTRUCTURE, not a verdict. Fail-closed (blocking); re-run this check."
            exit 1
          fi
          MATCHES=$(printf '%s\n' "$ids" | grep -c . || true)
          if [ "${MATCHES:-0}" -ge 1 ]; then
            echo "composition satisfied — reviewer App ($EXPECTED_ID) APPROVED at head $HEAD_SHA."
            exit 0
          fi
          echo "::error::no counting reviewer-App approval (bot id $EXPECTED_ID) at head $HEAD_SHA — blocking merge until the App approves the current head."
          exit 1
