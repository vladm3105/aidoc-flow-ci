# markdown-lint.yml — reusable markdown-lint workflow (powered by markdownlint-cli2).
#
# CRITICAL: this installs + runs `markdownlint-cli2` from npm directly, NOT
# the `DavidAnson/markdownlint-cli2-action` marketplace wrapper. Reason (same
# defect class that broke secret-scan + links, fixed ci/v1.9.2 / v1.9.4):
#   - allowed-actions policy: canon may `uses:` only `actions/*`, `github/*`,
#     and `vladm3105/aidoc-flow-ci/*` (REPO_STANDARDS §4.3).
#     `DavidAnson/markdownlint-cli2-action` is published by a NON-verified
#     creator, so it is also BLOCKED at run-init → `startup_failure` (this is
#     why markdown-lint never deployed on any consumer). This does not
#     generalize — the deployed allowlist sets `verified_allowed: true`, so a
#     VERIFIED creator's action is admitted and runs; see §4.3. Installing the
#     npm package in a `run:` step needs no action allowlist;
#     `actions/setup-node` IS allowlisted (`actions/*`) and guarantees Node on
#     self-hosted runners.
#
# Design decisions (ci/v1.9.4):
#   - `markdownlint-cli2` (the maintained successor to markdownlint-cli),
#     pinned to npm `0.23.0`, installed globally in a run: step.
#   - markdownlint-cli2 auto-detects `GITHUB_ACTIONS` and emits
#     ::error file=…,line=…:: workflow commands inline on PRs — no separate
#     problem-matcher action needed.
#   - Globs: caller passes a newline-separated glob list (default '**/*.md').
#   - Config: cli2's DEFAULT ruleset is very strict (MD013 line-length=80
#     flags almost every real doc). Ship `install/templates/.markdownlint.json`
#     (relaxes MD013/MD024/MD033/MD041/MD060) and adopt it per repo before enabling this
#     as a blocking gate — otherwise every repo reds on cosmetic style. See
#     REPO_STANDARDS §4.3.
#
# Consumer caller (typical):
#
#   name: markdown-lint
#   on:
#     pull_request:
#     push: { branches: [main] }
#   jobs:
#     md:
#       uses: vladm3105/aidoc-flow-ci/.github/workflows/markdown-lint.yml@ci/v2.2.0
#       with:
#         globs: |
#           **/*.md
#           !node_modules

name: markdown-lint

on:
  workflow_call:
    inputs:
      globs:
        description: 'Newline-separated list of globs to lint. Default "**/*.md". Use !pattern to exclude (e.g. "!node_modules").'
        type: string
        default: '**/*.md'
      config:
        description: 'Path to a markdownlint config file. Default empty — cli2 auto-resolves .markdownlint-cli2.{jsonc,yaml,cjs,mjs} or .markdownlint.{jsonc,json,yaml,yml,cjs,mjs} in the repo root.'
        type: string
        default: ''
      fix:
        description: 'Apply automatic fixes (writes back to working tree). Default false; useful for the autofix pipeline (IPLAN-0014) but not for a blocking PR gate.'
        type: boolean
        default: false
      fail-on-findings:
        description: 'Whether lint findings fail the job. Default true (blocking gate). Set false for a REPORT-ONLY rollout — cli2 still emits ::error PR annotations, but the job exits 0 so it does not block merge. (GitHub forbids continue-on-error on a reusable-call job, so report-only must be expressed here, not in the caller.)'
        type: boolean
        default: true
      runner_labels:
        description: 'JSON array (or single-string) of runner labels. Default "ubuntu-latest" — lightweight Node-based linter. PRIVATE consumers per OPS-0049 may override to the self-hosted "ci-runner/single-use" pool.'
        type: string
        default: '"ubuntu-latest"'

permissions:
  contents: read

jobs:
  lint:
    name: markdownlint
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # setup-node is allowlisted (actions/*) and guarantees Node on
      # self-hosted ephemeral runners that may not pre-bake it.
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install + run markdownlint-cli2
        # Consumer-controlled inputs are mapped to env (NOT interpolated into
        # the shell) so a hostile `globs`/`config` value cannot inject
        # `${{ }}` expressions. Globs are collected with noglob so the shell
        # does not expand them — markdownlint-cli2 does its own globbing.
        env:
          GLOBS: ${{ inputs.globs }}
          CONFIG: ${{ inputs.config }}
          FIX: ${{ inputs.fix }}
          FAIL: ${{ inputs.fail-on-findings }}
        run: |
          set -euo pipefail
          # --ignore-scripts: markdownlint-cli2 is pure JS (no build step), so
          # skipping lifecycle scripts closes the transitive-dep install-time
          # code-exec surface with no functional loss (parity with the
          # verify-before-execute posture of the binary installs).
          npm install -g --ignore-scripts markdownlint-cli2@0.23.0
          args=()
          [ -n "${CONFIG}" ] && args+=(--config "${CONFIG}")
          [ "${FIX}" = "true" ] && args+=(--fix)
          # Collect newline-separated globs as literal strings (skip blanks).
          globlist=()
          set -o noglob
          while IFS= read -r line; do
            [ -n "${line}" ] && globlist+=("${line}")
          done <<< "${GLOBS}"
          set +o noglob
          # Report-only mode (fail-on-findings=false): cli2 still prints the
          # ::error annotations, but we swallow its non-zero exit so the job
          # doesn't block merge. (continue-on-error is illegal on the CALLER's
          # reusable-call job, so the toggle lives here.)
          if [ "${FAIL}" = "true" ]; then
            markdownlint-cli2 "${args[@]}" "${globlist[@]}"
          else
            markdownlint-cli2 "${args[@]}" "${globlist[@]}" || echo "::notice::markdown-lint report-only — findings above do not block merge (fail-on-findings=false)"
          fi
