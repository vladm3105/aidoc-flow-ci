# docs-sync.yml — mechanical post-merge documentation fixer (reusable workflow).
#
# Per IPLAN-0018 (operations 2026-06-25). Fires after every merge to main +
# runs deterministic doc-fix operations + commits results back to main with
# `[skip ci]` (live mode only; alpha.1 ships dry-run only).
#
# THREE OPERATIONS (each disable-able via .github/docs-sync.json):
#   1. CHANGELOG stub-entry — scripts/docs-sync/changelog_stub.py
#   2. Version-string propagation — scripts/docs-sync/version_sync.py (alpha.1 stub)
#   3. Cross-ref dead-link repair — scripts/docs-sync/cross_ref_repair.py (alpha.1 stub)
#
# SAFETY (per IPLAN-0018 §3.5 threat model — all 6 mitigations):
#   1. Per-installation App token (1h lifetime; aidoc-flow-bot App)
#   2. Server-side commit-content allowlist (only modify allowed_paths)
#   3. Branch protection bypass scoped to aidoc-flow-bot App only
#   4. Audit-trail commit message references triggering PR + workflow run
#   5. Hardcoded rate-limit cap (max 50 commits/day per consumer)
#   6. Per-operation kill-switch in config.json + dry-run mode
#
# RECURSION GUARDS (belt-and-suspenders per IPLAN-0018 §3.3):
#   - [skip ci] in bot commit message (suppresses push trigger)
#   - if: github.actor != 'aidoc-flow-bot[bot]' (second guard)
#
# Consumer caller (typical):
#
#   name: docs-sync
#   on:
#     push: { branches: [main] }
#   jobs:
#     call:
#       uses: vladm3105/aidoc-flow-ci/.github/workflows/docs-sync.yml@ci/v2.12.0
#       secrets: inherit

name: docs-sync

on:
  workflow_call:
    inputs:
      config_path:
        description: 'Path to consumer config file. Default: .github/docs-sync.json'
        type: string
        default: '.github/docs-sync.json'
      runner_labels:
        description: 'JSON array (or single-string) of runner labels. Default ubuntu-latest.'
        type: string
        default: '"ubuntu-latest"'
      dry_run_override:
        description: 'Override config dry_run setting (true=force dry-run; false=force live). Empty = use config.'
        type: string
        default: ''
    secrets:
      AIDOC_FLOW_BOT_ID:
        description: 'aidoc-flow-bot App numeric ID. Required for non-dry-run mode.'
        required: false
      AIDOC_FLOW_BOT_KEY:
        description: 'aidoc-flow-bot App private key (PEM). Required for non-dry-run mode.'
        required: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: docs-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    # Recursion guard #2 (belt-and-suspenders for [skip ci]).
    if: ${{ github.actor != 'aidoc-flow-bot[bot]' && github.event.head_commit.author.username != 'aidoc-flow-bot[bot]' }}
    name: post-merge mechanical doc-sync
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 20
    steps:
      - name: Checkout (full history for git rename detection)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Resolve config + dry-run mode
        id: cfg
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
          DRY_RUN_OVERRIDE: ${{ inputs.dry_run_override }}
        run: |
          set -euo pipefail
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "::notice::No $CONFIG_PATH found; docs-sync is opt-in — exiting cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DRY_RUN=$(jq -r '.dry_run // false' "$CONFIG_PATH")
          if [ -n "$DRY_RUN_OVERRIDE" ]; then
            DRY_RUN="$DRY_RUN_OVERRIDE"
          fi
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "::notice::docs-sync running; dry_run=$DRY_RUN"

      - name: Fetch operation scripts from the adopted canon tag
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          # WHICH canon version: read the adopted `@ci/vX.Y.Z` pin from the
          # consumer's OWN checked-out docs-sync caller (the `actions/checkout`
          # above put it on disk). We deliberately do NOT use
          # `github.workflow_ref` — inside a `workflow_call` reusable it is the
          # CALLER's entry ref (the consumer's default branch), NOT this
          # reusable's pin, so it silently fetched scripts from `main` regardless
          # of the adopted tag (FT-15, confirmed live 2026-07-21). And
          # `github.job_workflow_sha` is not accessible as a workflow expression
          # (actionlint rejects it; it is an OIDC claim, not a context field).
          # Matches both pin forms canon accepts — plain `@ci/vX.Y.Z` and the
          # commented-SHA `@<40-hex> # ci/vX.Y.Z` — and is keyed to THIS
          # workflow's filename so a pin for a different reusable can never be
          # picked up. (Two callers pinned to different tags resolve to the
          # highest — an abnormal install.)
          [ -d .github/workflows ] \
            || { echo "::error::docs-sync: .github/workflows/ not found after checkout — INFRASTRUCTURE error, not a sync result."; exit 1; }

          # Read only real `uses:` lines in files GitHub actually executes: a
          # *.yml.bak/*.disabled leftover or a commented-out example must never
          # supply the tag (it would WIN the version sort — verified).
          set +e
          USES_LINES="$(grep -rhE --include='*.yml' --include='*.yaml' '^[[:space:]]*uses:' .github/workflows/)"
          grc=$?
          set -e
          # grep rc: 0=match, 1=no match, >=2=real error (unreadable dir). Without
          # this split, an I/O error is misreported as "caller not installed".
          [ "$grc" -le 1 ] \
            || { echo "::error::docs-sync: could not read .github/workflows/ (grep exit $grc) — INFRASTRUCTURE error, not a sync result."; exit 1; }

          PINS="$(printf '%s\n' "$USES_LINES" \
            | grep -ohE 'vladm3105/aidoc-flow-ci/\.github/workflows/docs-sync\.yml@([0-9a-f]{40} +# +)?ci/v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?' \
            | sort -u || true)"
          PIN_COUNT="$(printf '%s' "$PINS" | grep -c . || true)"
          [ "$PIN_COUNT" -ge 1 ] \
            || { echo "::error::docs-sync: could not find a docs-sync '@ci/vX.Y.Z' pin on a 'uses:' line in .github/workflows/ — is this caller installed from the canon template? INFRASTRUCTURE error, not a sync result."; exit 1; }
          # Fail CLOSED on ambiguity: only one reusable actually runs, so the
          # correct tag is unknowable from the tree. Picking the highest would
          # silently fetch a version the repo never adopted.
          [ "$PIN_COUNT" -eq 1 ] \
            || { echo "::error::docs-sync: found $PIN_COUNT differing docs-sync pins in .github/workflows/ — resolve to one. INFRASTRUCTURE error, not a sync result."; printf '%s\n' "$PINS" | sed 's/^/  /'; exit 1; }

          CANON_TAG="$(printf '%s' "$PINS" | grep -oE 'ci/v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?')"
          CANON_SHA="$(printf '%s' "$PINS" | grep -oE '@[0-9a-f]{40}' | tr -d '@' || true)"
          case "$CANON_TAG" in
            *-*) echo "::error::docs-sync: pre-release canon pin '${CANON_TAG}' is not supported — pin a released ci/vX.Y.Z tag. INFRASTRUCTURE error, not a sync result."; exit 1 ;;
          esac
          # When the caller pinned by SHA, GitHub EXECUTES that SHA — so fetch the
          # assets from the SHA too. The trailing `# ci/vX.Y.Z` is documentation
          # and can lag the SHA; trusting it would run one version's workflow with
          # another version's scripts (FT-15's class via the other pin form).
          FETCH_REF="${CANON_SHA:-$CANON_TAG}"
          echo "::notice::docs-sync: adopted canon pin vladm3105/aidoc-flow-ci@${CANON_TAG} (fetching at ${FETCH_REF})"

          # owner/repo hardcoded to the canonical canon — never derived from
          # caller-controlled input (FT-15 D2: deriving the owner from
          # `workflow_ref` broke external adopters, who fetched
          # <their-org>/aidoc-flow-ci and 404'd).
          BASE="https://raw.githubusercontent.com/vladm3105/aidoc-flow-ci/${FETCH_REF}/scripts/docs-sync"
          mkdir -p .docs-sync-scripts
          for op in changelog_stub version_sync cross_ref_repair; do
            curl --fail --silent --show-error --location --retry 3 --retry-delay 2 \
              -o ".docs-sync-scripts/${op}.py" "${BASE}/${op}.py" \
              || { echo "::error::docs-sync: failed to fetch ${op}.py from vladm3105/aidoc-flow-ci@${FETCH_REF} — INFRASTRUCTURE error, not a sync result. Re-run."; exit 1; }
            chmod +x ".docs-sync-scripts/${op}.py"
          done
          ls -la .docs-sync-scripts/

      - name: Run operation 1 — CHANGELOG stub-entry
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
          MERGE_SHA: ${{ github.sha }}
        run: python3 .docs-sync-scripts/changelog_stub.py

      - name: Run operation 2 — Version-string propagation
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: python3 .docs-sync-scripts/version_sync.py

      - name: Run operation 3 — Cross-ref dead-link repair
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: python3 .docs-sync-scripts/cross_ref_repair.py

      - name: Count proposed changes
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        id: detect
        run: |
          set -euo pipefail
          # alpha.1 bug: find on missing dir exits 1 → set -euo pipefail kills job
          # when ALL ops produced no proposals (the common case in alpha). Ensure
          # the dir exists before counting so an empty result is "proposed=0", not failure.
          mkdir -p .docs-sync-proposed
          COUNT=$(find .docs-sync-proposed -maxdepth 1 -name '*.proposed' -type f | wc -l)
          echo "proposed=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::docs-sync proposed $COUNT changes"

      - name: Apply changes (live mode only)
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run != 'true' && steps.detect.outputs.proposed != '0' }}
        env:
          BOT_ID: ${{ secrets.AIDOC_FLOW_BOT_ID }}
          BOT_KEY: ${{ secrets.AIDOC_FLOW_BOT_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${BOT_ID:-}" ] || [ -z "${BOT_KEY:-}" ]; then
            echo "::error::live-mode requires AIDOC_FLOW_BOT_ID + AIDOC_FLOW_BOT_KEY secrets. Configure App + secrets per IPLAN-0018 §3.4 first."
            exit 1
          fi
          echo "::notice::alpha.1 stub — live-mode commit logic ships in alpha.2 (per IPLAN-0018 §3.7 P4 graduation)"

      - name: Post dry-run comment (dry-run mode)
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run == 'true' && steps.detect.outputs.proposed != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PR=$(gh api "repos/${{ github.repository }}/commits/$MERGE_SHA/pulls" --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR" ]; then
            echo "::notice::dry-run: no PR found for merge $MERGE_SHA; skipping comment"
            exit 0
          fi
          COUNT="${{ steps.detect.outputs.proposed }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(mktemp)
          {
            echo "🤖 **docs-sync (dry-run)** — proposed ${COUNT} mechanical doc updates after this merge."
            echo ""
            echo "In live mode, the bot would commit these changes directly to main with [skip ci]. See workflow run: ${RUN_URL}"
            echo ""
            echo "Per IPLAN-0018 §3.1, graduation from dry-run to live requires ≥5 merges with zero proposed-vs-applied file-set divergence."
          } > "$BODY"
          gh pr comment "$PR" --repo "${{ github.repository }}" --body-file "$BODY"
