# docs-sync.yml — mechanical post-merge documentation fixer (reusable workflow).
#
# Per IPLAN-0018 (operations 2026-06-25). Fires after every merge to main +
# runs deterministic doc-fix operations + commits results back to main with
# `[skip ci]` (live mode only; alpha.1 ships dry-run only).
#
# THREE OPERATIONS (each disable-able via .github/docs-sync.json):
#   1. CHANGELOG stub-entry — scripts/docs-sync/changelog_stub.py
#   2. Version-string propagation — scripts/docs-sync/version_sync.py (alpha.1 stub)
#   3. Cross-ref dead-link repair — scripts/docs-sync/cross_ref_repair.py (alpha.1 stub)
#
# SAFETY (per IPLAN-0018 §3.5 threat model — all 6 mitigations):
#   1. Per-installation App token (1h lifetime; aidoc-flow-bot App)
#   2. Server-side commit-content allowlist (only modify allowed_paths)
#   3. Branch protection bypass scoped to aidoc-flow-bot App only
#   4. Audit-trail commit message references triggering PR + workflow run
#   5. Hardcoded rate-limit cap (max 50 commits/day per consumer)
#   6. Per-operation kill-switch in config.json + dry-run mode
#
# RECURSION GUARDS (belt-and-suspenders per IPLAN-0018 §3.3):
#   - [skip ci] in bot commit message (suppresses push trigger)
#   - if: github.actor != 'aidoc-flow-bot[bot]' (second guard)
#
# Consumer caller (typical):
#
#   name: docs-sync
#   on:
#     push: { branches: [main] }
#   jobs:
#     call:
#       uses: vladm3105/aidoc-flow-ci/.github/workflows/docs-sync.yml@ci/v1.9.2
#       secrets: inherit

name: docs-sync

on:
  workflow_call:
    inputs:
      config_path:
        description: 'Path to consumer config file. Default: .github/docs-sync.json'
        type: string
        default: '.github/docs-sync.json'
      runner_labels:
        description: 'JSON array (or single-string) of runner labels. Default ubuntu-latest.'
        type: string
        default: '"ubuntu-latest"'
      dry_run_override:
        description: 'Override config dry_run setting (true=force dry-run; false=force live). Empty = use config.'
        type: string
        default: ''
    secrets:
      AIDOC_FLOW_BOT_ID:
        description: 'aidoc-flow-bot App numeric ID. Required for non-dry-run mode.'
        required: false
      AIDOC_FLOW_BOT_KEY:
        description: 'aidoc-flow-bot App private key (PEM). Required for non-dry-run mode.'
        required: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: docs-sync
  cancel-in-progress: false

jobs:
  sync:
    # Recursion guard #2 (belt-and-suspenders for [skip ci]).
    if: ${{ github.actor != 'aidoc-flow-bot[bot]' && github.event.head_commit.author.username != 'aidoc-flow-bot[bot]' }}
    name: post-merge mechanical doc-sync
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 20
    steps:
      - name: Checkout (full history for git rename detection)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Resolve config + dry-run mode
        id: cfg
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
          DRY_RUN_OVERRIDE: ${{ inputs.dry_run_override }}
        run: |
          set -euo pipefail
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "::notice::No $CONFIG_PATH found; docs-sync is opt-in — exiting cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DRY_RUN=$(jq -r '.dry_run // false' "$CONFIG_PATH")
          if [ -n "$DRY_RUN_OVERRIDE" ]; then
            DRY_RUN="$DRY_RUN_OVERRIDE"
          fi
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "::notice::docs-sync running; dry_run=$DRY_RUN"

      - name: Fetch operation scripts from aidoc-flow-ci
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        env:
          CI_TAG: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          # The reusable workflow's `github.workflow_ref` looks like:
          # vladm3105/aidoc-flow-ci/.github/workflows/docs-sync.yml@ci/v1.9.2
          # Extract the @<tag> portion to fetch matching scripts.
          TAG="${CI_TAG##*@}"
          BASE="https://raw.githubusercontent.com/vladm3105/aidoc-flow-ci/${TAG}/scripts/docs-sync"
          mkdir -p .docs-sync-scripts
          for op in changelog_stub version_sync cross_ref_repair; do
            curl -fsSL "${BASE}/${op}.py" -o ".docs-sync-scripts/${op}.py"
            chmod +x ".docs-sync-scripts/${op}.py"
          done
          ls -la .docs-sync-scripts/

      - name: Run operation 1 — CHANGELOG stub-entry
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
          MERGE_SHA: ${{ github.sha }}
        run: python3 .docs-sync-scripts/changelog_stub.py

      - name: Run operation 2 — Version-string propagation
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: python3 .docs-sync-scripts/version_sync.py

      - name: Run operation 3 — Cross-ref dead-link repair
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: python3 .docs-sync-scripts/cross_ref_repair.py

      - name: Count proposed changes
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        id: detect
        run: |
          set -euo pipefail
          # alpha.1 bug: find on missing dir exits 1 → set -euo pipefail kills job
          # when ALL ops produced no proposals (the common case in alpha). Ensure
          # the dir exists before counting so an empty result is "proposed=0", not failure.
          mkdir -p .docs-sync-proposed
          COUNT=$(find .docs-sync-proposed -maxdepth 1 -name '*.proposed' -type f | wc -l)
          echo "proposed=$COUNT" >> "$GITHUB_OUTPUT"
          echo "::notice::docs-sync proposed $COUNT changes"

      - name: Apply changes (live mode only)
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run != 'true' && steps.detect.outputs.proposed != '0' }}
        env:
          BOT_ID: ${{ secrets.AIDOC_FLOW_BOT_ID }}
          BOT_KEY: ${{ secrets.AIDOC_FLOW_BOT_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${BOT_ID:-}" ] || [ -z "${BOT_KEY:-}" ]; then
            echo "::error::live-mode requires AIDOC_FLOW_BOT_ID + AIDOC_FLOW_BOT_KEY secrets. Configure App + secrets per IPLAN-0018 §3.4 first."
            exit 1
          fi
          echo "::notice::alpha.1 stub — live-mode commit logic ships in alpha.2 (per IPLAN-0018 §3.7 P4 graduation)"

      - name: Post dry-run comment (dry-run mode)
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run == 'true' && steps.detect.outputs.proposed != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PR=$(gh api "repos/${{ github.repository }}/commits/$MERGE_SHA/pulls" --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR" ]; then
            echo "::notice::dry-run: no PR found for merge $MERGE_SHA; skipping comment"
            exit 0
          fi
          COUNT="${{ steps.detect.outputs.proposed }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(mktemp)
          {
            echo "🤖 **docs-sync (dry-run)** — proposed ${COUNT} mechanical doc updates after this merge."
            echo ""
            echo "In live mode, the bot would commit these changes directly to main with [skip ci]. See workflow run: ${RUN_URL}"
            echo ""
            echo "Per IPLAN-0018 §3.1, graduation from dry-run to live requires ≥5 merges with zero proposed-vs-applied file-set divergence."
          } > "$BODY"
          gh pr comment "$PR" --repo "${{ github.repository }}" --body-file "$BODY"
