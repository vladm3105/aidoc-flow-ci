# audit-trail-check consumer caller for aidoc-flow-ci itself.
#
# Self-adoption per PLAN-002 §5.4 (Wave 0). aidoc-flow-ci is the canon
# home + a product-code tier consumer of its own reusables. This caller
# invokes the PR-U3 reusable so every PR on aidoc-flow-ci gets the same
# OPS-0069 audit-trail gate the workspace repos will get during Wave
# 1-5 rollout.
#
# Check-name renders as `call / verify` per aidoc-flow-ci naming
# convention (matches `call / ai-review` + `call / composition`). Add
# to branch-protection `contexts` on aidoc-flow-ci main via a follow-up
# `apply-standards.sh --apply` run (F5 blast-radius — founder-manual).

name: audit-trail

on:
  pull_request:
    # `labeled, unlabeled` are load-bearing, not cosmetic: the reusable's
    # documented escape hatch is the two-signal override (the `skip-audit-trail`
    # LABEL + a commit-body marker). Without a `labeled` trigger, applying the
    # label fires no event, so the check never re-runs and the red check never
    # clears — the operator is told to apply a label that cannot take effect and
    # has to push an empty commit instead. ai-review's callers already include
    # these; audit-trail was the outlier.
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/audit-trail-check.yml@ci/v2.3.0
    with:
      runner_labels: '"ubuntu-latest"'
    permissions:
      contents: read
      pull-requests: read
