# secret-scan.yml — reusable secret scanning workflow (powered by gitleaks).
#
# CRITICAL: this wraps `gacts/gitleaks` (MIT-licensed, no key) NOT
# the official `gitleaks/gitleaks-action`. The official action
# switched to a proprietary EULA at v2.0.0 (May 2026); org-owned
# repos (including OSS) require a license key via Google Form. The
# free starter license covers ONE repo. For a shared CI library
# consumed by many org repos, that's a downstream foot-gun for
# every consumer. The CMS OSPO guide
# (https://dsacms.github.io/ospo-guide/resources/gitleaks-action-license/)
# explicitly points to gacts/gitleaks as the MIT-licensed wrapper
# for this use case. Same `gitleaks` binary underneath; no signup.
#
# Design decisions (research findings 2026-06-24):
#   - Use gacts/gitleaks@v1.3.2 (MIT) NOT gitleaks/gitleaks-action
#     (proprietary EULA; org license required).
#   - Full-clone scan (fetch-depth: 0). gitleaks `detect` (full
#     history) is the right shape for a PR gate; gitleaks `protect`
#     (diff only) is for pre-commit, not CI.
#   - SARIF output uploaded to GitHub Code Scanning so findings
#     appear in the PR's "Files changed" view via annotations.
#     Requires `security-events: write` permission.
#   - Default config sufficient for ~90% of repos; .gitleaks.toml
#     allowlist is opt-in.
#
# Layered defense (consumer also enables):
#   - GitHub Secret Scanning + push protection (free on public repos;
#     auto-revokes leaked tokens via partner program)
#   - Pre-commit gitleaks (sub-second on a diff; fully offline)
#   - Scheduled trufflehog (live-credential verification; slower;
#     kills false positives)
#
# This workflow covers the PR-gate layer only.

name: secret-scan

on:
  workflow_call:
    inputs:
      config-path:
        description: 'Path to a .gitleaks.toml in the consumer repo (optional). Without it, gitleaks uses its default ruleset.'
        type: string
        default: ''
      fail-on-findings:
        description: 'Whether secret findings fail the job. Default true — a PR-gate that does not block isn''t a gate.'
        type: boolean
        default: true
      runner_labels:
        description: 'JSON array (or single-string) of runner labels. Default "ubuntu-latest". PRIVATE consumers per OPS-0049 may override to "runner-self".'
        type: string
        default: '"ubuntu-latest"'

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    steps:
      - name: Checkout (full history for detect mode)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: gitleaks
        uses: gacts/gitleaks@c9a0338361dc45a01aa7ebaaa5330179f3c62873 # v1.3.2
        with:
          config: ${{ inputs.config-path }}
          fail: ${{ inputs.fail-on-findings }}
          format: sarif
          report: gitleaks.sarif

      - name: Upload SARIF to Code Scanning
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: gitleaks.sarif
          category: secret-scan
