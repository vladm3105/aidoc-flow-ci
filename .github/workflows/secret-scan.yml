# secret-scan.yml — reusable secret scanning workflow (powered by gitleaks).
#
# CRITICAL: this installs + runs the upstream `gitleaks` BINARY directly, NOT a
# marketplace wrapper action. Two reasons:
#   1. allowed-actions policy: canon workflows may `uses:` only `actions/*`,
#      `github/*`, and `vladm3105/aidoc-flow-ci/*` (REPO_STANDARDS §4.3). Both
#      candidate wrappers here are published by NON-verified creators
#      (gacts/gitleaks, gitleaks/gitleaks-action), so they are additionally
#      BLOCKED at run-init → startup_failure on every consumer. (Note the
#      deployed allowlist also sets `verified_allowed: true`, so a VERIFIED
#      creator's action would run — "third-party ⇒ startup_failure" is NOT
#      universal; see §4.3.) Running the binary needs no action allowlist.
#   2. licensing: the official `gitleaks/gitleaks-action` went proprietary-EULA
#      at v2.0.0 (per-repo license key). The upstream `gitleaks` binary itself is
#      MIT-licensed + needs no key. Same scanner, no signup, no allowlist change.
#
# Design decisions (ci/v1.9.2 fix; originally research findings 2026-06-24):
#   - Curl the pinned gitleaks binary release (MIT), run `gitleaks dir`.
#   - Full-clone scan (fetch-depth: 0). gitleaks `detect` (full
#     history) is the right shape for a PR gate; gitleaks `protect`
#     (diff only) is for pre-commit, not CI.
#   - SARIF output uploaded to GitHub Code Scanning so findings
#     appear in the PR's "Files changed" view via annotations.
#     Requires `security-events: write` permission.
#   - Default config sufficient for ~90% of repos; .gitleaks.toml
#     allowlist is opt-in.
#
# Layered defense (consumer also enables):
#   - GitHub Secret Scanning + push protection (free on public repos;
#     auto-revokes leaked tokens via partner program)
#   - Pre-commit gitleaks (sub-second on a diff; fully offline)
#   - Scheduled trufflehog (live-credential verification; slower;
#     kills false positives)
#
# This workflow covers the PR-gate layer only.

name: secret-scan

on:
  workflow_call:
    inputs:
      config-path:
        description: 'Path to a .gitleaks.toml in the consumer repo (optional). Without it, gitleaks uses its default ruleset. MUST declare `[extend] useDefault = true` or its own `[[rules]]` — see validate-config.'
        type: string
        default: ''
      fail-on-findings:
        description: 'Whether secret findings fail the job. Default true — a PR-gate that does not block isn''t a gate.'
        type: boolean
        default: true
      validate-config:
        description: 'Prove the resolved config can actually detect a planted credential before scanning. Default true. Set false ONLY for a repo whose custom [[rules]] deliberately do not cover AWS/GitHub credentials — this disables the guard against a rule-less config that scans nothing.'
        type: boolean
        default: true
      runner_labels:
        description: 'JSON array (or single-string) of runner labels. Default "ubuntu-latest". PRIVATE consumers per OPS-0049 may override to the self-hosted "ci-runner/single-use" pool.'
        type: string
        default: '"ubuntu-latest"'

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    steps:
      - name: Checkout (full history for detect mode)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Install + run the gitleaks binary directly, NOT a marketplace wrapper
      # action. Canon may `uses:` only `actions/*`, `github/*`, and
      # `vladm3105/aidoc-flow-ci/*` (REPO_STANDARDS §4.3); `gacts/gitleaks` is a
      # non-verified creator, so it is also BLOCKED at run-init →
      # startup_failure (this is why secret-scan never deployed on any
      # consumer). The upstream gitleaks binary is MIT-licensed + needs no key,
      # so we curl the pinned release.
      - name: Run gitleaks (binary)
        env:
          GL_VERSION: "8.30.1"
          GL_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          CONFIG: ${{ inputs.config-path }}
          FAIL: ${{ inputs.fail-on-findings }}
          VALIDATE: ${{ inputs.validate-config }}
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" -o /tmp/gl.tgz
          printf '%s  %s\n' "$GL_LINUX_X64_SHA256" /tmp/gl.tgz | sha256sum --check --strict
          BIN_DIR="$RUNNER_TEMP/bin"
          mkdir -p "$BIN_DIR"
          tar -xzf /tmp/gl.tgz -C "$BIN_DIR" gitleaks
          chmod 0755 "$BIN_DIR/gitleaks"
          # The default scans every path. False positives must be suppressed by
          # a consumer-owned, narrowly scoped .gitleaks.toml; tests/examples are
          # common locations for accidental real credentials and are not safe
          # blanket exclusions.
          if [ -z "${CONFIG}" ]; then
            # The heredoc body + terminator MUST stay at this file's block-scalar
            # indentation (10 spaces) — YAML ends a block scalar at the first
            # column-0 line, so de-indenting them here breaks the workflow parse.
            # After YAML strips that indentation the body reaches the shell at
            # column 0, which is why the terminator matches and the TOML is
            # already flush. (A `sed -i 's/^          //'` used to follow, with a
            # comment claiming it stripped indentation the heredoc carried — by
            # then there was none left to strip, so it matched nothing. Removed;
            # the indentation above is the real mechanism.)
            cat > /tmp/gitleaks-default.toml <<'TOML'
          [extend]
          useDefault = true
          TOML
            CONFIG=/tmp/gitleaks-default.toml
          fi

          # --- config canary: prove the resolved config HAS EFFECTIVE RULES ---
          # A consumer .gitleaks.toml that declares an [allowlist] but neither
          # `[extend] useDefault = true` nor its own [[rules]] has ZERO rules. It
          # finds zero secrets and exits 0 — a GREEN REQUIRED CHECK THAT SCANS
          # NOTHING, and wiring config-path to silence a red gate is exactly how a
          # repo lands in that state. The failure is silent and inverted: the repo
          # ends up with LESS scanning than the default it replaced.
          #
          # SCOPE OF THE CLAIM (do not overstate it): this proves the ruleset is
          # non-empty. It does NOT prove the scan covers the repo — a config with
          # real rules plus a broad `[allowlist] paths` can still hide a live
          # secret, and that is a deliberate consumer choice canon does not
          # override. See REPO_STANDARDS §4.3a.
          #
          # We test BEHAVIOUR, not TOML text. Grepping for `^\[extend\]` was
          # measured to fail BOTH ways (8.30.1): it rejects the valid inline form
          # `extend = { useDefault = true }` (which detects fine), and it admits
          # `[extend]` + `disabledRules` with no useDefault (which detects
          # nothing). Scanning a planted credential is parser-agnostic and cannot
          # be fooled by either form.
          #
          # The canary is built by concatenation at runtime so this workflow's own
          # source carries no matchable credential (verified: gitleaks finds
          # nothing in this file). Do NOT use the well-known AKIA…EXAMPLE key —
          # gitleaks' default ruleset allowlists EXAMPLE-suffixed keys, so it is
          # NOT detected even under useDefault and the canary would pass rule-less
          # configs. Both fixtures below are verified-detected under useDefault.
          #
          # gitleaks exit codes are AMBIGUOUS here and MUST be disambiguated from
          # the log, not the code alone (all measured on 8.30.1):
          #   rc=1 + "unable to load gitleaks config" -> config missing/malformed
          #   rc=1 otherwise                          -> canary DETECTED  (good)
          #   rc=0 + "…: global allowlist"            -> canary was allowlisted
          #   rc=0 otherwise                          -> NO EFFECTIVE RULES (bad)
          # Match on "global allowlist" alone, NOT on "skipping file: global
          # allowlist": gitleaks emits "skipping DIRECTORY: global allowlist"
          # when the allowlist regex matches the canary's parent dir, which is
          # the likelier hit (the dir name is fixed; the file name is not).
          # Matching only the file form leaves this branch effectively dead.
          # Treating "any non-zero" as success would report a broken config as a
          # passing canary; failing on any rc=0 would red-gate a CORRECT config
          # whose [allowlist] happens to match the canary's own path.
          if [ "${VALIDATE}" = "true" ]; then
            # Writes the canary to $1/$2, scans it, sets CANARY_RC/CANARY_OUT.
            # BOTH the dir and the basename are caller-supplied so the retry can
            # randomize each: an allowlist like `.*canary.*` matches the FILE, so
            # randomizing only the directory leaves the retry suppressed too.
            run_canary () {
              local d="$1" name="$2"
              local c_aws="AKIA" c_aws_tail="J5N2QW3RTYUIOP4L"
              local c_gh="ghp_" c_gh_tail="A1b2C3d4E5f6G7h8I9j0K1l2M3n4O5p6Q7r8"
              rm -rf "$d"; mkdir -p "$d"
              # No file extension: `.txt` is among the most commonly allowlisted
              # suffixes, and an allowlisted canary proves nothing (below).
              {
                printf 'aws_access_key_id = %s%s\n' "$c_aws" "$c_aws_tail"
                printf 'github_pat = %s%s\n' "$c_gh" "$c_gh_tail"
              } > "$d/$name"
              CANARY_RC=0
              CANARY_OUT=$("$BIN_DIR/gitleaks" dir "$d" --no-banner --redact \
                --config "${CONFIG}" --log-level debug --exit-code 1 2>&1) || CANARY_RC=$?
              rm -rf "$d"
            }

            run_canary "$RUNNER_TEMP/gl-canary" "canary"

            if printf '%s' "$CANARY_OUT" | grep -qF 'unable to load gitleaks config'; then
              # Same rc as "leaks found" — separate it explicitly or a broken
              # config reads as a passing canary.
              echo "::error::secret-scan: gitleaks could not load the config at '${CONFIG}'. The scan cannot run:"
              printf '%s\n' "$CANARY_OUT" | grep -F 'unable to load gitleaks config' | head -1
              exit 1
            elif [ "$CANARY_RC" -eq 1 ]; then
              echo "secret-scan: config canary passed — '${CONFIG}' detected the planted credential, so its ruleset is effective. (Allowlist SCOPE is not validated — see REPO_STANDARDS §4.3a.)"
            elif printf '%s' "$CANARY_OUT" | grep -qF 'global allowlist'; then
              # The config's [allowlist] matched the canary's own path, so the
              # canary never reached the rules. rc=0 here is IDENTICAL for a
              # healthy config and a rule-less one, so this must not fail (that
              # would red-gate a correct config, and the predictable response is
              # validate-config: false — leaving the consumer worse off than
              # before this check existed). Retry at a randomized path the
              # allowlist is unlikely to match, which separates the two cases.
              run_canary "$RUNNER_TEMP/glc-${RANDOM}${RANDOM}" "f${RANDOM}${RANDOM}"
              if [ "$CANARY_RC" -eq 1 ]; then
                echo "secret-scan: config canary passed on retry — '${CONFIG}' allowlists the default canary path, but its ruleset detected the planted credential at a randomized path. (Allowlist SCOPE is not validated — see REPO_STANDARDS §4.3a.)"
              elif printf '%s' "$CANARY_OUT" | grep -qF 'global allowlist'; then
                echo "::warning::secret-scan: config canary INCONCLUSIVE — the [allowlist] in '${CONFIG}' matches even a randomized canary path, so it is effectively universal and rule-effectiveness cannot be proven. An allowlist this broad also suppresses findings in the real scan. Anchor the 'paths' regex (e.g. '^tests/fixtures/' rather than an unanchored match)."
              else
                echo "::error::secret-scan: the gitleaks config at '${CONFIG}' detected NOTHING in a planted-credential canary at a randomized path — it has no effective rules, so this scan would pass while scanning nothing. Add '[extend]' + 'useDefault = true' to it (keeping your [allowlist]), or declare your own [[rules]]. If your custom rules deliberately do not cover AWS/GitHub credentials, set 'validate-config: false' on this caller and record why."
                exit 1
              fi
            else
              echo "::error::secret-scan: the gitleaks config at '${CONFIG}' detected NOTHING in a planted-credential canary — it has no effective rules, so this scan would pass while scanning nothing. Add '[extend]' + 'useDefault = true' to it (keeping your [allowlist]), or declare your own [[rules]]. If your custom rules deliberately do not cover AWS/GitHub credentials, set 'validate-config: false' on this caller and record why."
              exit 1
            fi
          fi

          # NOTE: the canary failures above exit 1 regardless of `fail-on-findings`.
          # That is deliberate and is not an oversight: `fail-on-findings` governs
          # what to do about FINDINGS, whereas a config with no effective rules (or
          # one that cannot be loaded) is a broken precondition — there is no
          # meaningful report to downgrade to. A report-only consumer with a
          # rule-less config gets an empty report, which is the silent failure this
          # check exists to surface.
          ec=1; [ "${FAIL}" = "true" ] || ec=0
          "$BIN_DIR/gitleaks" git . --no-banner --redact \
            --report-format sarif --report-path gitleaks.sarif \
            --config "${CONFIG}" \
            --exit-code "${ec}"

      - name: Upload SARIF to Code Scanning
        # Skip on fork PRs: `security-events: write` is downgraded to read-only
        # on `pull_request` from a fork, so the upload fails. The gitleaks scan
        # above still runs and STILL FAILS the job on a real leak (the
        # load-bearing gate) — fork PRs just don't surface findings in the
        # Security tab. We keep `pull_request` (NOT pull_request_target) because
        # secret-scan MUST see the PR's code, and granting fork PRs write via
        # pull_request_target would defeat the safety boundary. (PLAN-004 B3.)
        #
        # continue-on-error (ci/v1.9.3): PRIVATE repos without GitHub Advanced
        # Security return 403 "code scanning not enabled" here. The SARIF upload
        # is a nice-to-have (surfacing findings in the Security tab); the
        # load-bearing GATE is the gitleaks step above, which already failed the
        # job on a real leak. So a failed upload must NOT fail the job.
        continue-on-error: true
        if: always() && hashFiles('gitleaks.sarif') != '' && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: gitleaks.sarif
          category: secret-scan
