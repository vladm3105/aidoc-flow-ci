# links.yml — reusable link-checking workflow (powered by lychee).
#
# CRITICAL: this installs + runs the upstream `lychee` BINARY directly, NOT
# the `lycheeverse/lychee-action` marketplace wrapper. Reason (same defect
# class that broke secret-scan, fixed ci/v1.9.2):
#   - allowed-actions policy: canon may `uses:` only `actions/*`, `github/*`,
#     and `vladm3105/aidoc-flow-ci/*` (REPO_STANDARDS §4.3).
#     `lycheeverse/lychee-action` is published by a NON-verified creator, so it
#     is also BLOCKED at run-init → `startup_failure` (proven live: links ran
#     startup_failure on operations + business). The message is web-UI-only;
#     `actionlint` does NOT catch it. Note this does not generalize: the
#     deployed allowlist sets `verified_allowed: true`, so a VERIFIED creator's
#     action is admitted and runs. Running the binary needs no action allowlist.
#
# Design decisions (ci/v1.9.4):
#   - Curl the pinned lychee release. Use the **musl** static build
#     (`x86_64-unknown-linux-musl`), NOT the gnu build: the gnu binary needs
#     GLIBC 2.38+ and fails on older self-hosted Debian ephemeral runners;
#     the musl build is statically linked and runs everywhere (ubuntu-latest
#     + self-hosted). SHA-256 verified.
#   - Two modes via `mode` input — internal (blocking PR-gate; `--offline`
#     so only internal/relative links are checked, no network flake) vs
#     external (scheduled cron; hits the network; non-blocking).
#   - Cache via actions/cache/restore + actions/cache/save with
#     if:always() so cache persists even when the run fails.
#   - GITHUB_TOKEN passed via env to avoid GH rate limits on github.com links.
#
# Consumer caller (typical — uses BOTH modes via two job calls):
#
#   name: links
#   on:
#     pull_request:                # internal, blocking
#     push: { branches: [main] }
#     schedule: [{ cron: '0 6 * * 1' }]   # external, non-blocking
#   jobs:
#     internal:
#       if: github.event_name != 'schedule'
#       uses: vladm3105/aidoc-flow-ci/.github/workflows/links.yml@ci/v2.0.1
#       with: { mode: internal, fail-on-error: true }
#     external:
#       if: github.event_name == 'schedule'
#       uses: vladm3105/aidoc-flow-ci/.github/workflows/links.yml@ci/v2.0.1
#       with: { mode: external, fail-on-error: false }
#       permissions:
#         contents: read
#         issues: write   # for create-issue-from-file on failure

name: links

on:
  workflow_call:
    inputs:
      mode:
        description: '"internal" (PR-blocking; uses --offline so external URLs are skipped) or "external" (scheduled cron; checks external URLs).'
        type: string
        default: internal
      paths:
        description: 'Files/dirs to check. Default "." (whole repo; lychee handles .md/.html/.rst/.txt globs).'
        type: string
        default: '.'
      config-file:
        description: 'Path to a lychee.toml in the consumer repo. Default ".lychee.toml" — falls back to lychee defaults if missing.'
        type: string
        default: '.lychee.toml'
      fail-on-error:
        description: 'Whether broken links fail the job. Default true for internal mode (set false in caller for external).'
        type: boolean
        default: true
      runner_labels:
        description: 'JSON array (or single-string) of runner labels. Default "ubuntu-latest". PRIVATE consumers per OPS-0049 may override to the self-hosted "ci-runner/single-use" pool.'
        type: string
        default: '"ubuntu-latest"'

permissions:
  contents: read

jobs:
  lychee:
    name: lychee (${{ inputs.mode }})
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Restore lychee cache
        id: cache-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lycheecache
          key: lychee-${{ inputs.mode }}-${{ github.sha }}
          restore-keys: |
            lychee-${{ inputs.mode }}-

      # Install the lychee binary directly (musl static build) — NOT a
      # marketplace wrapper action, which the allowed-actions policy blocks.
      - name: Install lychee (musl static binary)
        env:
          LYCHEE_VERSION: "0.24.2"
          LYCHEE_SHA256: "73657a111819a30c47c08352896796f23d64e4eb2b3ed39b6d32149241566fc5"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-musl.tar.gz" -o /tmp/lychee.tgz
          echo "${LYCHEE_SHA256}  /tmp/lychee.tgz" | sha256sum -c -
          tar -xzf /tmp/lychee.tgz -C /tmp
          BIN_DIR="$RUNNER_TEMP/bin"
          mkdir -p "$BIN_DIR"
          install -m 0755 /tmp/lychee-x86_64-unknown-linux-musl/lychee "$BIN_DIR/lychee"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          "$BIN_DIR/lychee" --version

      - name: Run lychee
        # Consumer-controlled inputs are mapped to env (NOT interpolated into
        # the shell) so a hostile `paths`/`config-file` value cannot inject
        # `${{ }}` expressions. Env expansion does not re-evaluate command
        # substitution, so `$(...)` in a value is inert; PATHS is left
        # unquoted only to word-split multiple paths (its documented shape).
        env:
          MODE: ${{ inputs.mode }}
          CONFIG: ${{ inputs.config-file }}
          PATHS: ${{ inputs.paths }}
          FAIL: ${{ inputs.fail-on-error }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          args=(--no-progress --cache --max-cache-age 1d)
          [ -f "${CONFIG}" ] && args+=(--config "${CONFIG}")
          [ "${MODE}" = "internal" ] && args+=(--offline)
          read -r -a path_args <<< "$PATHS"
          [ "${#path_args[@]}" -gt 0 ] || { echo "::error::paths input is empty"; exit 1; }
          set +e
          # `--` stops a caller-supplied PATHS value from being parsed as
          # lychee options (defense-in-depth against argument injection).
          lychee "${args[@]}" -- "${path_args[@]}"
          rc=$?
          # fail-on-error=false (external/scheduled mode) never fails the job.
          [ "${FAIL}" = "true" ] || exit 0
          exit "${rc}"

      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lycheecache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
