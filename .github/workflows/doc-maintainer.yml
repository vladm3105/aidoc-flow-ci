# doc-maintainer.yml — AI-driven post-merge doc-of-record maintainer.
#
# Per IPLAN-0025 (operations 2026-06-28) — supersedes mechanical
# docs-sync.yml at end of Phase 3 (ci/v2.0.0). This reusable workflow:
#
#   1. Reads the merge diff + per-consumer conventions doc.
#   2. Invokes the configured LiteLLM model to PLAN which docs-of-record need
#      updating (the AI decides scope; no hardcoded trigger map).
#   3. Risk-tier partitions the plan into low-risk and high-risk sets.
#   4. Dry-run: posts a PR-comment listing proposed edits. Live: opens
#      a follow-up bot PR for low-risk edits (auto-merges through the
#      v1.3.0 ai-review chain — REQUIRES P3a trust-allowlist precondition
#      adding aidoc-flow-bot[bot] to consumer's .github/ai-review/config.json
#      per IPLAN-0025 Risk 13 / D11) AND/OR opens a GitHub issue for
#      high-risk edits (human applies).
#
# SAFETY (per IPLAN-0025 §1 + §4 risks):
#   1. Outer path allowlist — plan entries outside `allowed_paths` are
#      rejected before LLM apply-mode (Risk 1).
#   2. Per-op kill switches in config.json (changelog / handoff_narrative
#      / roadmap / iplan_status / decisions / date_staleness /
#      version_propagation / cross_ref_repair).
#   3. dry_run mode (PR-comment only; no bot PR) and kill_switch (workflow
#      exits before LLM cost). See §2.2 _comment2.
#   4. max_edits_per_pr + max_prs_per_day caps.
#   5. Prompt redacts secret-shaped strings (Risk 11) and forbids source
#      code / governance config edits.
#   6. LiteLLM unavailable → fail LOUD with ::error:: + open tracking
#      issue (D12 / Risk 12); never silently misses.
#
# RECURSION GUARDS (belt-and-suspenders):
#   - [skip ci] in bot commit message (suppresses push trigger).
#   - if: github.actor != 'aidoc-flow-bot[bot]' (second guard).
#
# Consumer caller (typical):
#
#   name: doc-maintainer
#   on:
#     push: { branches: [main] }
#     schedule:
#       - cron: '7,37 * * * *'   # off-peak reconciler (per IPLAN-0025 D9)
#   jobs:
#     call:
#       uses: vladm3105/aidoc-flow-ci/.github/workflows/doc-maintainer.yml@ci/v2.7.0
#       secrets: inherit

name: doc-maintainer

on:
  workflow_call:
    inputs:
      config_path:
        description: 'Path to consumer config file. Default: .github/doc-maintainer.json'
        type: string
        default: '.github/doc-maintainer.json'
      conventions_path:
        description: 'Path to consumer conventions doc (AI reads). Default: .github/doc-maintainer-conventions.md'
        type: string
        default: '.github/doc-maintainer-conventions.md'
      model:
        description: 'LiteLLM model alias used for planning and documentation edits.'
        type: string
        default: 'ai-doc-maintainer'
      litellm_allow_insecure_http:
        description: 'Explicitly allow an HTTP LiteLLM URL (private networks only).'
        type: boolean
        default: false
      runner_labels:
        description: 'JSON array of runner labels. Default ubuntu-latest.'
        type: string
        default: '"ubuntu-latest"'
      dry_run_override:
        description: 'Override config dry_run (true=force dry-run; false=force live). Empty = use config.'
        type: string
        default: ''
      merge_sha:
        description: 'Merge commit to analyze. Empty uses github.sha; the scheduled reconciler supplies this when recovering a missed push run.'
        type: string
        default: ''
    secrets:
      AIDOC_FLOW_BOT_ID:
        description: 'aidoc-flow-bot App numeric ID. Required for non-dry-run mode.'
        required: false
      AIDOC_FLOW_BOT_KEY:
        description: 'aidoc-flow-bot App private key (PEM). Required for non-dry-run mode.'
        required: false
      LITELLM_BASE_URL:
        description: 'LiteLLM proxy base URL, normally ending in /v1.'
        required: false
      LITELLM_DOC_API_KEY:
        description: 'Scoped LiteLLM virtual key. Do not use a master key.'
        required: false

permissions: {}

concurrency:
  # Keyed by event so a cron reconcile never queues behind a slow push
  # maintain run (they are now separate jobs — Pass-4 corr-M4). Two runs of
  # the SAME event on the same ref still serialize.
  group: doc-maintainer-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  # Schedule-only reconciler (IPLAN-0025 §2.4 reliability backup). Split into
  # its OWN job so the cron path cannot fall through into the maintain
  # pipeline. The prior single-job design gated the reconcile step on
  # `schedule` but keyed every downstream step on a dedup output that is
  # UNSET on schedule (`'' != 'true'` → true), so cron fired the whole LLM
  # pipeline. (Pre-prod BLOCKER B1 / PLAN-004 §5.2.1.)
  reconcile:
    if: ${{ github.event_name == 'schedule' }}
    name: Doc-maintainer reconcile (schedule backup)
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout (shallow — reconcile.py reads nothing from the tree; it uses gh api)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Fetch reconcile script from aidoc-flow-ci
        env:
          CI_TAG: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          # Pinned-tag fetch so the script matches the reusable's tag exactly.
          TAG="${CI_TAG##*@}"
          CI_OWNER=$(echo "${CI_TAG}" | cut -d/ -f1)
          mkdir -p .doc-maintainer-scripts
          curl -fsSL "https://raw.githubusercontent.com/${CI_OWNER}/aidoc-flow-ci/${TAG}/scripts/doc-maintainer/reconcile.py" \
            -o .doc-maintainer-scripts/reconcile.py
          chmod +x .doc-maintainer-scripts/reconcile.py

      - name: Reconcile — scan recent main commits for un-maintained SHAs
        run: |
          set -uo pipefail
          # IPLAN-0025 §2.4: cron is the reliability backup for the IPLAN-0018
          # "didn't fire" gap. Report-only in v1.4.0 alpha.1; workflow_dispatch
          # fan-out added in v1.4.1. This job is reconciler-ONLY (no pipeline).
          python3 .doc-maintainer-scripts/reconcile.py \
            --gh-repo "$GH_REPO" \
            --lookback-min 90 \
            --dispatch \
            || { echo "::error::reconcile.py failed — failing LOUD per IPLAN-0025 D12 / Risk 12"; exit 1; }
          echo "::notice::reconciler complete."

  maintain:
    # Push-triggered pipeline ONLY — the reconcile job owns the schedule path.
    # Actor guards prevent bot-PR merges from recursively opening another PR;
    # generated commits intentionally do NOT use [skip ci], so normal PR gates run.
    if: ${{ github.event_name != 'schedule' && github.actor != 'aidoc-flow-bot[bot]' && github.event.head_commit.author.username != 'aidoc-flow-bot[bot]' }}
    name: AI-driven doc maintenance
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      MERGE_SHA: ${{ inputs.merge_sha || github.sha }}
      CONFIG_PATH: ${{ inputs.config_path }}
      CONVENTIONS_PATH: ${{ inputs.conventions_path }}
      LITELLM_MODEL: ${{ inputs.model }}
      DRY_RUN_OVERRIDE: ${{ inputs.dry_run_override }}
      LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
      LITELLM_API_KEY: ${{ secrets.LITELLM_DOC_API_KEY }}
      LITELLM_ALLOW_INSECURE_HTTP: ${{ inputs.litellm_allow_insecure_http }}
    steps:
      - name: Checkout (full history for git rename detection + doc inventory)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Fetch operation scripts from aidoc-flow-ci
        env:
          CI_TAG: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          # Per IPLAN-0024 curl-replaces-checkout: fetch the per-tag operation
          # scripts so they match the reusable's pinned tag exactly.
          TAG="${CI_TAG##*@}"
          CI_OWNER=$(echo "${CI_TAG}" | cut -d/ -f1)
          BASE="https://raw.githubusercontent.com/${CI_OWNER}/aidoc-flow-ci/${TAG}/scripts/doc-maintainer"
          mkdir -p .doc-maintainer-scripts
          for op in planner apply reconcile; do
            curl -fsSL "${BASE}/${op}.py" -o ".doc-maintainer-scripts/${op}.py"
            chmod +x ".doc-maintainer-scripts/${op}.py"
          done
          curl -fsSL "https://raw.githubusercontent.com/${CI_OWNER}/aidoc-flow-ci/${TAG}/scripts/litellm_client.py" \
            -o .doc-maintainer-scripts/litellm_client.py
          ls -la .doc-maintainer-scripts/

      - name: Step 1 — Deterministic dedup check (skip if maintainer-bot PR exists for this SHA)
        id: dedup
        run: |
          set -uo pipefail
          # Per IPLAN-0025 §2.1 step 1: SHA-tied dedup. If an open
          # maintainer-bot PR already targets this merge SHA's branch
          # suffix, exit cleanly — saves LLM cost.
          # per_page=100 in case the consumer has >30 open PRs (default
          # pagination would miss the bot PR in the dedup scan).
          SHA8="${MERGE_SHA:0:8}"
          existing=$(gh api "repos/$GH_REPO/pulls?state=open&per_page=100" \
            --jq "[.[] | select(.user.login == \"aidoc-flow-bot[bot]\" and (.head.ref | endswith(\"-$SHA8\")))] | length" 2>/dev/null || echo "0")
          if [ "${existing:-0}" -ge 1 ]; then
            echo "::notice::Step 1 dedup: existing maintainer-bot PR covers SHA $SHA8 — exiting cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Step 2 — Resolve config + conventions + dry-run mode
        id: cfg
        env:
          DEDUP_SKIP: ${{ steps.dedup.outputs.skip }}
        run: |
          set -uo pipefail
          # cfg runs UNCONDITIONALLY and carries the dedup decision forward.
          # It was gated `if: steps.dedup.outputs.skip != 'true'`, which left
          # cfg's outputs UNSET when dedup skipped → every downstream gate
          # `steps.cfg.outputs.skip != 'true'` became `'' != 'true'` = true,
          # firing the whole pipeline (incl. the live bot-PR step, bypassing
          # the dry-run guard) even though dedup said "already covered". Same
          # fall-through class as the schedule bug this PR fixes. Emitting
          # skip=true here keeps cfg.skip always DEFINED so all gates hold.
          if [ "$DEDUP_SKIP" = "true" ]; then
            echo "::notice::Step 2 — dedup already covered this SHA; skipping config resolution + pipeline."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "::notice::No $CONFIG_PATH found; doc-maintainer is opt-in — exiting cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Validate JSON syntax BEFORE jq queries; malformed config must fail
          # LOUD (per D12) not fail-open to LIVE mode. Without this check, a
          # broken config silently yields empty KILL + empty DRY_RUN, which
          # would fall through to step 10's live-mode `if:`.
          jq empty "$CONFIG_PATH" >/dev/null 2>&1 \
            || { echo "::error::malformed config JSON at $CONFIG_PATH — failing LOUD per IPLAN-0025 D12"; exit 1; }
          KILL=$(jq -r '.kill_switch // false' "$CONFIG_PATH")
          if [ "$KILL" = "true" ]; then
            echo "::notice::doc-maintainer kill_switch=true; exiting cleanly (no LLM cost incurred)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DRY_RUN=$(jq -r '.dry_run // true' "$CONFIG_PATH")
          if [ -n "$DRY_RUN_OVERRIDE" ]; then
            DRY_RUN="$DRY_RUN_OVERRIDE"
          fi
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "::notice::doc-maintainer running; dry_run=$DRY_RUN model=$LITELLM_MODEL"

      - name: Step 3 — Validate LiteLLM configuration
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        run: |
          set -euo pipefail
          [ -n "$LITELLM_BASE_URL" ] || { echo "::error::LITELLM_BASE_URL is unset"; exit 1; }
          [ -n "$LITELLM_API_KEY" ] || { echo "::error::LITELLM_DOC_API_KEY is unset"; exit 1; }
          [ -n "$LITELLM_MODEL" ] || { echo "::error::LiteLLM model alias is unset"; exit 1; }

      - name: Steps 4-7 — Inventory candidates + AI plan + validate + tier-classify
        if: ${{ steps.cfg.outputs.skip != 'true' }}
        id: plan
        run: |
          set -uo pipefail
          # planner.py exits non-zero on hard errors (allowlist violation,
          # LLM outage after retries, invalid config schema) → workflow must
          # fail LOUD per D12 / Risk 12. Explicit gate is required because
          # `set -uo pipefail` (no -e) would otherwise swallow the planner
          # non-zero exit + fall through to jq lines (which would then fail
          # on missing plan JSON, emit error to stderr, but produce empty
          # low_count/high_count outputs → downstream `if:` conditions would
          # evaluate against "" not "0" → live-mode steps would fire).
          python3 .doc-maintainer-scripts/planner.py \
            --merge-sha "$MERGE_SHA" \
            --gh-repo "$GH_REPO" \
            --config "$CONFIG_PATH" \
            --conventions "$CONVENTIONS_PATH" \
            --model "$LITELLM_MODEL" \
            --out-plan .doc-maintainer-plan.json \
            || { echo "::error::planner.py failed — failing LOUD per IPLAN-0025 D12 / Risk 12"; exit 1; }
          # Now safe to read the plan JSON.
          low_count=$(jq '.low_risk_set | length' .doc-maintainer-plan.json)
          high_count=$(jq '.high_risk_set | length' .doc-maintainer-plan.json)
          echo "low_count=$low_count" >> "$GITHUB_OUTPUT"
          echo "high_count=$high_count" >> "$GITHUB_OUTPUT"
          echo "::notice::Plan: low_risk=$low_count, high_risk=$high_count"

      - name: Step 8 — Apply edits (low-risk set; produces .proposed files)
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.plan.outputs.low_count != '0' }}
        run: |
          set -uo pipefail
          # Same fail-LOUD discipline as the planner: apply.py exit 1 must
          # not be swallowed by `set -uo pipefail` (no -e).
          python3 .doc-maintainer-scripts/apply.py \
            --plan .doc-maintainer-plan.json \
            --tier low_risk \
            --gh-repo "$GH_REPO" \
            --model "$LITELLM_MODEL" \
            --out-dir .doc-maintainer-proposed \
            || { echo "::error::apply.py failed — failing LOUD per IPLAN-0025 D12 / Risk 12"; exit 1; }

      - name: Step 9 — Dry-run branch — post PR comment + exit
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run == 'true' }}
        run: |
          set -uo pipefail
          PR=$(gh api "repos/$GH_REPO/commits/$MERGE_SHA/pulls" --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR" ]; then
            echo "::notice::dry-run: no PR found for merge $MERGE_SHA; skipping comment"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LOW_COUNT="${{ steps.plan.outputs.low_count }}"
          HIGH_COUNT="${{ steps.plan.outputs.high_count }}"
          BODY=$(mktemp)
          PATCH=.doc-maintainer-proposed.patch
          : > "$PATCH"
          while IFS= read -r path; do
            diff -u --label "a/$path" --label "b/$path" "$path" ".doc-maintainer-proposed/${path}.proposed" >> "$PATCH"
            rc=$?
            [ "$rc" -le 1 ] || { echo "::error::could not render dry-run patch for $path"; exit "$rc"; }
          done < <(jq -r '.low_risk_set[].path' .doc-maintainer-plan.json)
          {
            echo "🤖 **doc-maintainer (dry-run)** — proposed doc edits after merge of PR #${PR}."
            echo ""
            echo "- **Low-risk edits proposed:** ${LOW_COUNT} (would land via a bot PR through ai-review chain in live mode)"
            echo "- **High-risk edits proposed:** ${HIGH_COUNT} (would surface as a GitHub issue for human application in live mode)"
            echo ""
            jq -r '(.low_risk_set + .high_risk_set)[] | "- `\(.path)`: \(.instruction) — \(.rationale)"' .doc-maintainer-plan.json
            if [ -s "$PATCH" ]; then
              echo ""
              echo "<details><summary>Generated low-risk patch preview (truncated to 40 KB)</summary>"
              echo ""
              echo '```diff'
              head -c 40000 "$PATCH"
              echo ""
              echo '```'
              echo "</details>"
            fi
            echo ""
            echo "Workflow run: ${RUN_URL}"
            echo ""
            echo "Per IPLAN-0025 §3 P4, graduation to live requires ≥5 dry-run cycles with coherent edit proposals + zero allowlist violations + zero infrastructure errors."
          } > "$BODY"
          gh pr comment "$PR" --body-file "$BODY"

      - name: Upload dry-run proposed patch
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run == 'true' && steps.plan.outputs.low_count != '0' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: doc-maintainer-proposed-${{ github.sha }}
          path: .doc-maintainer-proposed.patch
          if-no-files-found: error
          retention-days: 14

      - name: Mint doc-maintainer App token
        id: bot_token
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run != 'true' && steps.plan.outputs.low_count != '0' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.AIDOC_FLOW_BOT_ID }}
          private-key: ${{ secrets.AIDOC_FLOW_BOT_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Step 10 — Live branch (low-risk) — open bot PR
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run != 'true' && steps.plan.outputs.low_count != '0' }}
        env:
          BOT_TOKEN: ${{ steps.bot_token.outputs.token }}
        run: |
          set -euo pipefail
          [ -n "${BOT_TOKEN:-}" ] || { echo "::error::could not mint doc-maintainer App token"; exit 1; }
          PR=$(gh api "repos/$GH_REPO/commits/$MERGE_SHA/pulls" --jq '.[0].number' 2>/dev/null || echo "")
          [ -n "$PR" ] || { echo "::error::cannot resolve source PR for $MERGE_SHA"; exit 1; }
          MAX_PRS=$(jq -r '.max_prs_per_day // 5' "$CONFIG_PATH")
          TODAY=$(date -u +%F)
          CREATED_TODAY=$(GH_TOKEN="$BOT_TOKEN" gh api "repos/$GH_REPO/pulls?state=all&per_page=100&sort=created&direction=desc" \
            --jq "[.[] | select(.user.login == \"aidoc-flow-bot[bot]\" and (.created_at | startswith(\"$TODAY\")))] | length")
          [ "$CREATED_TODAY" -lt "$MAX_PRS" ] || { echo "::error::doc-maintainer daily PR cap reached ($CREATED_TODAY/$MAX_PRS)"; exit 1; }
          python3 - <<'PY'
          import json, pathlib, shutil
          plan = json.load(open('.doc-maintainer-plan.json'))
          root = pathlib.Path('.doc-maintainer-proposed')
          for entry in plan['low_risk_set']:
              path = pathlib.PurePosixPath(entry['path'])
              if path.is_absolute() or '..' in path.parts:
                  raise SystemExit(f"unsafe proposed path: {path}")
              source = root / f"{path}.proposed"
              if not source.is_file():
                  raise SystemExit(f"missing proposed file: {source}")
              shutil.copyfile(source, pathlib.Path(path))
          PY
          BRANCH="docs/doc-maintainer-${MERGE_SHA:0:8}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "aidoc-flow-bot[bot]"
          git config user.email "aidoc-flow-bot[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          while IFS= read -r path; do git add -- "$path"; done < <(jq -r '.low_risk_set[].path' .doc-maintainer-plan.json)
          git diff --cached --quiet && { echo "::error::agent proposed no effective documentation changes"; exit 1; }
          git commit -m "docs: maintain documentation for PR #${PR}"
          git remote set-url origin "https://x-access-token:${BOT_TOKEN}@github.com/${GH_REPO}.git"
          git push origin "HEAD:refs/heads/$BRANCH"
          git remote set-url origin "https://github.com/${GH_REPO}.git"
          BODY=$(mktemp)
          {
            echo "Automated documentation follow-up for #${PR}."
            echo ""
            jq -r '.low_risk_set[] | "- `\(.path)`: \(.rationale)"' .doc-maintainer-plan.json
            echo ""
            echo "Generated by the doc-maintainer agent; normal CI and AI review still apply."
          } > "$BODY"
          GH_TOKEN="$BOT_TOKEN" gh pr create --base "${{ github.event.repository.default_branch }}" --head "$BRANCH" \
            --title "docs: maintain documentation for PR #${PR}" --body-file "$BODY"

      - name: Step 11 — Live branch (high-risk) — open GitHub issue
        if: ${{ steps.cfg.outputs.skip != 'true' && steps.cfg.outputs.dry_run != 'true' && steps.plan.outputs.high_count != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR=$(jq -r '.pr_number' .doc-maintainer-plan.json)
          TITLE="Documentation follow-up required for PR #${PR}"
          EXISTS=$(gh api "repos/$GH_REPO/issues?state=all&per_page=100" --jq "[.[] | select(.title == \"$TITLE\")] | length")
          [ "$EXISTS" -eq 0 ] || { echo "::notice::high-risk follow-up already exists for PR #${PR}"; exit 0; }
          BODY=$(mktemp)
          {
            echo "The doc-maintainer identified documentation changes requiring human judgment after PR #${PR}."
            echo ""
            jq -r '.high_risk_set[] | "## `\(.path)`\n\n**Required update:** \(.instruction)\n\n**Reason:** \(.rationale)\n"' .doc-maintainer-plan.json
          } > "$BODY"
          gh issue create --title "$TITLE" --body-file "$BODY"

      - name: Cleanup
        if: always()
        run: rm -rf .doc-maintainer-scripts .doc-maintainer-proposed .doc-maintainer-plan.json .doc-maintainer-proposed.patch
