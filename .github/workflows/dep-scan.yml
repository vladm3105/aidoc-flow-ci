# dep-scan.yml — reusable dependency-vulnerability (SCA) gate, powered by osv-scanner.
# PLAN-014 Phase 1.
#
# Installs the osv-scanner BINARY directly (SHA-256 verified) — NOT a marketplace
# action (canon may `uses:` only actions/*, github/*, vladm3105/aidoc-flow-ci/* per
# REPO_STANDARDS §4.3). Emits SARIF to GitHub Code scanning (public repos w/ free
# GHAS — best-effort, continue-on-error) and gates the PR via `fail-on-findings`.
#
# UNIFORM PROTECTED (PLAN-014 §1a): ONE template, self-hosted, public AND private —
# a visibility flip is a no-op. Safe on public because the scan is FORK-GUARDED: a
# fork PR skips the scan (fork code never runs on the self-hosted pool; forks are
# human-reviewed via ai-review). A non-fork PR is a collaborator's branch (push
# access) → scanned. This is the fork-guard interpretation of §1a's "trusted,
# non-fork" gate: non-fork ⟹ collaborator ⟹ trusted (an explicit author allowlist,
# like ai-review's, can be layered later — it adds no meaningful control for a
# read-only scanner where every collaborator PR should be scanned).
#
# DATA-ONLY (enforced): osv-scanner's Go call-analysis is ON BY DEFAULT and COMPILES
# source (govulncheck) — arbitrary code execution at build time. It is opt-OUT, so
# the scan invocation passes `--no-call-analysis=all` to keep it strictly
# manifest/lockfile reading. NEVER remove that flag or pass `--call-analysis`.
name: dep-scan

on:
  workflow_call:
    inputs:
      fail-on-findings:
        description: 'Whether a known-vulnerable dependency fails the job. Default false (report-only rollout per PLAN-014 §5); flip to true to make it a blocking gate.'
        type: boolean
        default: false
      scan-path:
        description: 'Path to scan (recursively). Default "." (repo root).'
        type: string
        default: '.'
      expect-manifests:
        description: 'Default true. When true, "no supported manifests found" (osv-scanner exit 128) is a COVERAGE gap — it warns, and fails when fail-on-findings is also true (a security gate that scanned nothing must not silently pass). Set false ONLY for a genuinely dependency-free repo.'
        type: boolean
        default: true
      runner_labels:
        description: 'JSON array (or single-string) of runner labels. Default the self-hosted single-use pool (PLAN-013 uniform protected — the SAME on public + private, so a visibility flip is a no-op).'
        type: string
        default: '["self-hosted", "ci-runner", "single-use"]'

permissions:
  contents: read
  security-events: write   # SARIF → Code scanning (downgraded to read on fork PRs; forks are skipped anyway)

concurrency:
  group: dep-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: dep-scan
    # FORK GUARD: a fork PR never runs the scanner on the self-hosted pool (forks are
    # human-reviewed via ai-review). Non-fork PRs (collaborators) + push events run.
    if: ${{ github.event.pull_request.head.repo.fork != true }}
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 15
    steps:
      - name: Checkout (data-only; no persisted creds)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      # Install + run the osv-scanner binary directly (SHA-256 verified). A wrapper
      # action (google/osv-scanner-action) is a non-`vladm3105/aidoc-flow-ci` publisher
      # → blocked by the canon authoring allowlist (REPO_STANDARDS §4.3); the binary
      # needs no allowlist and no signup.
      - name: Run osv-scanner (binary; data-only SCA)
        env:
          OSV_VERSION: "2.4.0"
          OSV_LINUX_AMD64_SHA256: "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0"
          FAIL: ${{ inputs.fail-on-findings }}
          SCAN_PATH: ${{ inputs.scan-path }}
          EXPECT_MANIFESTS: ${{ inputs.expect-manifests }}
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || { echo "::error::jq not found on the runner — infrastructure error, not a finding."; exit 1; }
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o /tmp/osv-scanner
          printf '%s  %s\n' "$OSV_LINUX_AMD64_SHA256" /tmp/osv-scanner | sha256sum --check --strict
          BIN_DIR="$RUNNER_TEMP/bin"; mkdir -p "$BIN_DIR"
          mv /tmp/osv-scanner "$BIN_DIR/osv-scanner"; chmod 0755 "$BIN_DIR/osv-scanner"

          summary() { echo "dep-scan: $1" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"; }

          # DATA-ONLY scan. `--no-call-analysis=all` is LOAD-BEARING: osv-scanner's Go
          # call-analysis is ON BY DEFAULT and compiles source (code execution) — this
          # keeps the scan to manifest/lockfile READING only. Never remove it.
          rc=0
          "$BIN_DIR/osv-scanner" scan source -r --no-call-analysis=all \
            --format sarif --output-file osv.sarif "$SCAN_PATH" || rc=$?

          # osv-scanner exit codes: 0 = scanned, no vulns · 1–126 = vulnerabilities found
          # · 127 = general error · 128 = no packages found · 129–255 = other errors.
          if [ "$rc" -eq 0 ]; then
            echo "::notice::dep-scan: no known-vulnerable dependencies."
            summary "clean — packages scanned, no known vulnerabilities."
          elif [ "$rc" -eq 128 ]; then
            # No manifests matched. A security gate that scanned NOTHING must not pass
            # silently — surface it as a warning, and (when expected + blocking) fail.
            echo "::warning::dep-scan: no supported manifests/lockfiles found under '${SCAN_PATH}' — scanned NOTHING (coverage gap). If this repo genuinely has no dependencies, set expect-manifests:false; otherwise check scan-path / the ecosystem."
            summary "⚠️ NO manifests found — scanned nothing (coverage gap)."
            if [ "$EXPECT_MANIFESTS" = "true" ] && [ "$FAIL" = "true" ]; then
              echo "::error::dep-scan: expected dependency manifests but found none — failing (zero-coverage on a blocking gate). Set expect-manifests:false for a dependency-free repo."; exit 1
            fi
          elif [ "$rc" -ge 1 ] && [ "$rc" -le 126 ]; then
            # Vulnerability-result range: findings ARE expected. Cross-check the SARIF.
            n=0
            [ -s osv.sarif ] && n=$(jq '[.runs[].results[]] | length' osv.sarif 2>/dev/null || echo 0)
            case "$n" in ''|*[!0-9]*) n=0 ;; esac
            if [ "$n" -gt 0 ]; then
              echo "::warning::dep-scan: $n known-vulnerable-dependency finding(s) — see osv.sarif / the Security tab."
              summary "❌ $n known-vulnerable-dependency finding(s) (osv-scanner exit $rc)."
              if [ "$FAIL" = "true" ]; then
                echo "::error::dep-scan: failing the gate (fail-on-findings: true)."; exit 1
              fi
              echo "::notice::dep-scan: report-only (fail-on-findings: false) — not blocking. Flip fail-on-findings to gate."
            else
              # Contradiction: the tool signalled findings but the SARIF is empty/unparseable —
              # a possible MISSED finding (SARIF write/parse failure), NOT clean, NOT mere infra.
              echo "::error::dep-scan: osv-scanner signalled findings (exit $rc) but the SARIF has no parseable results — a SARIF write/parse failure that may be MASKING a real finding. Treated as a failure, not clean."
              summary "❌ osv-scanner signalled findings (exit $rc) but SARIF unparseable — possible missed finding."
              exit 1
            fi
          else
            # 127 or 129–255: genuine infrastructure/tool error.
            echo "::error::dep-scan: osv-scanner exited $rc (tool/infrastructure error, not a finding). Re-run."; exit 1
          fi

      - name: Upload SARIF to Code Scanning (best-effort; free on public repos w/ GHAS)
        # continue-on-error: private repos without GHAS return 403 "code scanning not
        # enabled" — the SARIF surfacing is a nice-to-have; the fail-on-findings GATE
        # above is the compliance control. A failed upload must NOT fail the job.
        # Fork guard is belt-and-suspenders (the scan job already skips forks).
        continue-on-error: true
        if: always() && hashFiles('osv.sarif') != '' && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork)
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: osv.sarif
          category: dep-scan
