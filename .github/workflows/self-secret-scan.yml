# self-secret-scan.yml — canon dogfoods the secret-scan gate it ships.
#
# WHY A SEPARATE FILE: `.github/workflows/secret-scan.yml` in this repo IS the
# reusable (workflow_call); it needs a CALLER to run on canon's own PRs. Canon's
# only other deployed caller was audit-trail (the pre-prod review's G3 finding:
# "canon deploys 1 of 5 canon callers"). This adds the secret-scan gate — canon
# should run the scanner it hands every consumer. Non-redundant: tests.yml lints
# (shellcheck/yamllint/actionlint) but runs no gitleaks.
#
# Public repo → ubuntu-latest (no runner_labels). Pinned to the released tag, not
# main, so canon consumes the same immutable version its consumers do. Verified
# clean at adoption (gitleaks 8.30.1, default ruleset, 195 commits → no leaks).

name: self-secret-scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/secret-scan.yml@ci/v2.9.0
    permissions:
      contents: read
      security-events: write
