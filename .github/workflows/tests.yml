# tests.yml — aidoc-flow-ci's own test suite (PLAN-007 W1).
# Runs tests/run.sh on every PR + push to main: static lint (shellcheck +
# yamllint + actionlint), reusable/caller workflow-contract assertions, and
# script-logic unit tests. This is the automated regression gate the library
# previously lacked (verification was fleet-dogfooding only).
name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  suite:
    name: suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # fetch-tags so tests/test_version_sync.sh can compare VERSION against
          # the latest published ci/v* tag. Without it the default shallow clone
          # has no tags, that assertion silently skips, and the guard greens on
          # the exact VERSION/tag drift it exists to catch — a check that checks
          # nothing. fetch-depth: 0 pulls full history + all tags.
          fetch-depth: 0

      - name: Install lint tools
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          # python3-yaml is EXPLICIT, not inherited. tests/test_precommit_merge.sh
          # and tests/test_install.sh Part 4 both skip-with-notice when PyYAML is
          # missing — a suite that reports 0 passed, 0 failed and exits 0. PyYAML
          # currently arrives only as a transitive dependency of yamllint, so
          # dropping or swapping that package would silently disarm both.
          sudo apt-get install -y -qq shellcheck yamllint jq python3-yaml
          # Pinned + hash-verified binary: avoids both a floating tool and
          # dependence on whichever Go toolchain ubuntu-latest currently has.
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz -o /tmp/actionlint.tgz
          printf '%s  %s\n' '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8' /tmp/actionlint.tgz | sha256sum --check --strict
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          BIN_DIR="$RUNNER_TEMP/bin"
          mkdir -p "$BIN_DIR"
          install -m 0755 /tmp/actionlint "$BIN_DIR/actionlint"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          "$BIN_DIR/actionlint" -version

      - name: Run test suite
        run: bash tests/run.sh
