# codeql.yml — reusable CodeQL security analysis workflow.
#
# Wraps github/codeql-action (v4) per the official GitHub pattern for
# rolling out code scanning at enterprise scale
# (https://github.blog/2022-09-28-best-practices-on-rolling-out-code-scanning-at-enterprise-scale/).
#
# Design decisions (research findings 2026-06-24):
#   - SHA-pinned to v4.36.1 (the latest tagged release). v3 enters
#     deprecation Dec 2026; v4 is the supported major.
#   - Explicit `languages` matrix (JSON array input) — auto-detect
#     doesn't follow newly-added languages and breaks reproducibility.
#   - `category: /language:${{matrix.language}}` — lets multiple
#     CodeQL workflows coexist without overwriting each other's
#     results in the GitHub Security tab.
#   - Three-stage matrix per language: init -> autobuild (or manual
#     build via build-command input) -> analyze.
#   - Permissions per the codeql-action README minimum:
#     actions:read, contents:read, security-events:write.
#   - Reusable-workflow shape per actions/reusable-workflows reference
#     (https://github.com/actions/reusable-workflows/blob/main/.github/workflows/codeql-analysis.yml).
#
# Consumer caller (typical):
#
#   name: CodeQL
#   on:
#     push:    { branches: [main] }
#     pull_request: { branches: [main] }
#     schedule: [{ cron: '20 14 * * 1' }]   # weekly Mon 14:20 UTC
#     workflow_dispatch:
#   jobs:
#     codeql:
#       uses: vladm3105/aidoc-flow-ci/.github/workflows/codeql.yml@ci/v2.8.0
#       with:
#         languages: '["python","actions"]'
#       permissions:
#         actions: read
#         contents: read
#         security-events: write

name: codeql

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL language identifiers (e.g. ["javascript-typescript","python","actions","go"]). Default ["actions"] — every repo with workflows benefits from scanning them. See https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages for the full list.'
        type: string
        default: '["actions"]'
      config-file:
        description: 'Path to a .github/codeql/codeql-config.yml in the consumer repo (optional). Use when you need paths-ignore / paths / disable-default-queries / custom query packs. Mutually exclusive with the inline `config` input.'
        type: string
        default: ''
      config:
        description: 'Inline CodeQL config YAML (string) — alternative to a config file. Useful for short paths-ignore lists. Mutually exclusive with `config-file`.'
        type: string
        default: ''
      build-command:
        description: 'Override autobuild with an explicit build command for compiled languages (cpp/csharp/java/swift). Leave empty to let autobuild discover the build.'
        type: string
        default: ''
      runner_labels:
        description: 'JSON array (or single-string) of runner labels. Default "ubuntu-latest" — CodeQL is widely tested on it; some compiled-language autobuilds may need macos/windows. PRIVATE consumers per OPS-0049 may override to the self-hosted "ci-runner/single-use" pool.'
        type: string
        default: '"ubuntu-latest"'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          languages: ${{ matrix.language }}
          config-file: ${{ inputs.config-file }}
          config: ${{ inputs.config }}

      - name: Autobuild
        if: ${{ inputs.build-command == '' }}
        uses: github/codeql-action/autobuild@21eb7f7842f33eafc83782b56fff2a2c43e9696f # v4.36.1

      - name: Manual build
        if: ${{ inputs.build-command != '' }}
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: |
          # env indirection (sec H4): run the consumer's build command via
          # $BUILD_COMMAND, NOT a `run: ${{ inputs.build-command }}` source
          # interpolation — so the value can't break out of / inject into the
          # workflow script. The double-quoted "$BUILD_COMMAND" reaches eval as
          # a single string; eval runs a multi-command build in one consistent
          # shell within this step (executing an arbitrary consumer build
          # command is this step's intended purpose).
          bash -c "$BUILD_COMMAND"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          category: /language:${{ matrix.language }}
          # Fork PRs get a read-only GITHUB_TOKEN (security-events: write is
          # downgraded on `pull_request` from a fork), so the SARIF upload to
          # code-scanning would fail and red the check. Skip ONLY the upload on
          # fork PRs — the analysis still runs (findings in the job log); push +
          # weekly cron + same-repo PRs upload normally. (PLAN-004 B3 / Pass-4
          # M7: kept on `pull_request`, not `pull_request_target` — the latter
          # would analyze the base ref and duplicate the push/cron coverage
          # while green-lighting an unanalyzed fork diff.)
          upload: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'never' || 'always' }}
